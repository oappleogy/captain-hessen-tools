const C = {

  g: "#059669", pk: "#e11d48", yl: "#ca8a04",
  t: "#1e293b", tm: "#475569", td: "#94a3b8",

function Pill({ color, children }) {
  return <span style={{ display: "inline-block", padding: "2px 8px", borderRadius: 10, background: color + "20", color, fontSize: 11, fontWeight: 600, marginRight: 4, marginBottom: 4 }}>{children}</span>;
}

function Section({ icon, title, sub, children }) {
  return (
    <div style={{ marginBottom: 48 }}>
      <div style={{ fontSize: 11, color: C.o, letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 }}>{icon} {sub}</div>
      <h2 style={{ fontSize: 22, fontWeight: 800, color: C.t, margin: "0 0 20px", lineHeight: 1.3 }}>{title}</h2>
      {children}
    </div>
  );
}

function Card({ children, style = {}, borderColor }) {
  return <div style={{ background: C.s2, borderRadius: 10, padding: 18, border: "1px solid " + (borderColor || C.bd), boxShadow: "0 1px 3px rgba(0,0,0,0.06)", ...style }}>{children}</div>;
}

function TabBar({ tabs, active, onChange, size = "sm" }) {
  return (
    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
      {tabs.map((t, i) => (
        <button key={i} onClick={() => onChange(i)} style={{
          padding: size === "sm" ? "6px 14px" : "10px 18px",
          background: active === i ? (t.color || C.o) + "18" : "#fff",
          border: "1px solid " + (active === i ? (t.color || C.o) : C.bd),
          borderRadius: 7, color: active === i ? (t.color || C.o) : C.tm,
          cursor: "pointer", fontSize: size === "sm" ? 12 : 13, fontWeight: active === i ? 700 : 500,
          transition: "all .25s", fontFamily: "inherit",
        }}>{t.icon ? t.icon + " " : ""}{t.label}</button>
      ))}
    </div>
  );
}
