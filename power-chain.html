function tag(text,color){return '<span class="tag" style="background:'+color+'20;color:'+color+'">'+text+'</span>';}
function mono(text,color,size){return '<span class="mono" style="color:'+(color||C.cyan)+';font-size:'+(size||12)+'px">'+text+'</span>';}

var currentTab="beats";

function renderTabs(){
  var bar=document.getElementById("tabBar");
  bar.innerHTML=TABS.map(function(t){
    var active=currentTab===t.key;
    return '<button class="tab-btn'+(active?' active':'')+'" data-tab="'+t.key+'" style="'+(active?'border-color:'+t.color+';background:'+t.color+'15;color:'+t.color:'')+'">'+t.label+'</button>';
  }).join('');
  bar.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.onclick=function(){currentTab=btn.dataset.tab;expanded=null;renderTabs();renderContent();};
  });
}

function renderContent(){
  var el=document.getElementById("tabContainer");
  if(currentTab==="beats") el.innerHTML=renderBeats();
  else if(currentTab==="chain") el.innerHTML=renderChain();
  else if(currentTab==="sa") el.innerHTML=renderSA();
  else if(currentTab==="longtail") el.innerHTML=renderLongtail();
  else if(currentTab==="compare") el.innerHTML=renderCompare();
  else if(currentTab==="upside") el.innerHTML=renderUpside();
  bindExpand();
}

function bindExpand(){
  document.querySelectorAll('[data-expand]').forEach(function(el){
    el.onclick=function(){
      var key=el.dataset.expand;
      expanded=expanded===key?null:key;
      renderContent();
    };
  });
}
