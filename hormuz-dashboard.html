  const c = severity === "critical" ? RED : severity === "high" ? ORANGE : severity === "resumed" ? GREEN : TEXT_DIM;
  return <div style={{ width: 8, height: 8, borderRadius: "50%", background: c, flexShrink: 0 }} />;
}

function LossTab() {
  const [animated, setAnimated] = useState(false);

  const total = waterfallData.reduce((s, d) => s + d.val, 0);
  const maxH = 280;
  const totalH = maxH;

  useEffect(() => {
    const t = setTimeout(() => setAnimated(true), 100);
    return () => clearTimeout(t);
  }, []);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ background: CARD, borderRadius: 8, padding: "24px 20px", border: `1px solid ${BORDER}` }}>

        </div>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: maxH + 40, paddingBottom: 40, position: "relative" }}>
          {/* grid lines */}
          {[2, 4, 6, 8, 10].map(v => (
            <div key={v} style={{
              position: "absolute",
              left: 0, right: 60,
              bottom: 40 + (v / total) * maxH,
              borderTop: "1px solid rgba(255,255,255,0.04)",
              display: "flex", alignItems: "center",
            }}>
              <span style={{ position: "absolute", right: -40, fontSize: 10, color: "rgba(255,255,255,0.15)", fontFamily: "monospace" }}>{v}</span>
            </div>
          ))}
          {waterfallData.map((d, i) => {
            const h = animated ? (d.val / total) * maxH : 0;
            return (
              <div
                key={i}
                style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", position: "relative", zIndex: 2 }}
                onMouseEnter={() => setHoveredBar(i)}
                onMouseLeave={() => setHoveredBar(null)}
              >
                <div style={{
                  fontFamily: "monospace",
                  fontSize: hoveredBar === i ? 15 : 13,
                  fontWeight: 600,
                  color: hoveredBar === i ? "#fff" : TEXT,
                  marginBottom: 4,
                  transition: "all 0.2s",
                }}>
                  {d.val}
                </div>
                <div style={{
                  width: "80%",
                  maxWidth: 48,
                  height: h,
                  background: `linear-gradient(180deg, ${d.color}, ${d.color}88)`,
                  borderRadius: "4px 4px 0 0",
                  transition: "height 0.8s cubic-bezier(0.22,1,0.36,1)",
                  transitionDelay: `${i * 0.08}s`,
                  opacity: hoveredBar !== null && hoveredBar !== i ? 0.4 : 1,
                  cursor: "default",
                }} />
                <div style={{
                  position: "absolute",
                  bottom: -32,
                  fontSize: 11,
                  color: hoveredBar === i ? TEXT : TEXT_DIM,
                  textAlign: "center",
                  whiteSpace: "nowrap",
                  transition: "color 0.2s",
                }}>
                  {d.label}
                </div>
              </div>
            );
          })}
          {/* total bar */}
          <div style={{ width: 2, background: "rgba(255,255,255,0.06)", margin: "0 4px", alignSelf: "stretch" }} />

            style={{ flex: 1.2, display: "flex", flexDirection: "column", alignItems: "center", position: "relative", zIndex: 2 }}

            <div style={{ fontFamily: "monospace", fontSize: 18, fontWeight: 700, color: RED, marginBottom: 4 }}>

              width: "80%",

              合计峰值

        background: RED_BG,
        borderRadius: 8,

        fontSize: 13,
        color: TEXT,

function ChainTab() {

    return () => clearInterval(iv);
  }, []);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

      <div style={{
        background: CARD,
        borderRadius: 8,
        padding: "28px 20px",

            <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
              <div
                onClick={() => setActiveNode(activeNode === i ? null : i)}

                  border: `1.5px solid ${
                    pulse === i
                      ? (n.danger ? RED : n.gold ? GOLD : "rgba(255,255,255,0.3)")
                      : (n.danger ? `${RED}44` : n.gold ? `${GOLD}44` : BORDER)
                  }`,
                  borderRadius: 8,
                  padding: "14px 28px",
                  cursor: "pointer",
                  transition: "all 0.3s",
                  textAlign: "center",
                  minWidth: 200,
                  boxShadow: pulse === i ? `0 0 20px ${n.danger ? RED : n.gold ? GOLD : "#fff"}15` : "none",

              >
                <div style={{
                  fontSize: 16,
                  fontWeight: 600,
                  color: n.danger ? RED : n.gold ? GOLD : TEXT,
                }}>
                  {n.text}
                </div>
                <div style={{ fontSize: 11, color: TEXT_DIM, marginTop: 2 }}>{n.sub}</div>
              </div>
              {i < chainNodes.length - 1 && (
                <div style={{
                  width: 1.5,
                  height: 20,
                  background: `linear-gradient(180deg, ${
                    chainNodes[i].danger || chainNodes[i + 1].danger ? `${RED}66` : "rgba(255,255,255,0.1)"
                  }, ${
                    chainNodes[i + 1].danger ? `${RED}66` : chainNodes[i + 1].gold ? `${GOLD}66` : "rgba(255,255,255,0.1)"
                  })`,
                }} />
              )}
            </div>
          ))}
        </div>

        {activeNode !== null && (
          <div style={{
            marginTop: 20,
            padding: 16,
            background: "rgba(255,255,255,0.03)",
            borderRadius: 6,
            fontSize: 13,
            color: TEXT,
            lineHeight: 1.8,
            borderLeft: `3px solid ${chainNodes[activeNode].danger ? RED : chainNodes[activeNode].gold ? GOLD : TEXT_DIM}`,
          }}>
            {activeNode === 0 && "全球AI数据中心电力需求指数级增长，同时挤占LNG修复所需的燃气轮机OEM产能。"}
            {activeNode === 1 && "数据中心电气化推动燃气轮机OEM积压2-4年订单，与煤电退役需求叠加。"}
            {activeNode === 2 && "海湾LNG占全球约20%贸易量。卡塔尔QatarEnergy已宣布Force Majeure。JKM(亚洲LNG基准价)已翻倍——即使直接进口份额低，价格传导也是全球联动的。"}
            {activeNode === 3 && "霍尔木兹承载全球20%原油和20%LNG贸易。封锁后替代管道容量仅约900万桶/天，远低于海峡的约2000万桶/天。"}
            {activeNode === 4 && "Ras Laffan LNG修复≤5年。油田停产后管线重新加压需2-5周。日本已释放8000万桶战略储备，但LNG无法长期储备——库存仅够2-3周。"}
            {activeNode === 5 && "市场在给AI forward earnings折现时，未将能源供给链脆弱性纳入折现率。日韩指数新高(日经59,691 / KOSPI 6,388)隐含假设'供给冲击是暂时的'——但修复周期说的是L型。"}

      </div>

      {/* Self-reinforcing loop */}
      <div style={{
        background: `linear-gradient(135deg, ${CARD}, #0d1630)`,
        borderRadius: 8,
        padding: 24,
        border: `1px solid ${GOLD}33`,
      }}>
        <div style={{ fontSize: 12, color: GOLD, fontFamily: "monospace", letterSpacing: 1, marginBottom: 14 }}>
          自反性结构 · REFLEXIVE LOOP
        </div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, flexWrap: "wrap" }}>
          {["AI扩张", "→", "电力需求↑", "→", "燃气轮机OEM被占", "→", "LNG修复延迟", "→", "能源风险↑", "→"].map((t, i) => (
            <span key={i} style={{
              fontSize: t === "→" ? 16 : 13,
              color: t === "→" ? TEXT_DIM : (i >= 6 ? RED : i >= 4 ? ORANGE : TEXT),
              fontWeight: t === "→" ? 400 : 600,
              padding: t === "→" ? 0 : "4px 10px",
              background: t === "→" ? "none" : "rgba(255,255,255,0.04)",
              borderRadius: 4,
            }}>
              {t}

          ))}
          <span style={{ fontSize: 13, fontWeight: 700, color: GOLD, padding: "4px 10px", background: `${GOLD}15`, borderRadius: 4 }}>
            ♻️ 循环
          </span>
        </div>
      </div>
    </div>
  );
}

function CountryCard({ data }) {
  const [expanded, setExpanded] = useState(null);
  const [animated, setAnimated] = useState(false);
  useEffect(() => { setTimeout(() => setAnimated(true), 100); }, []);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
      {/* Index banner */}
      <div style={{
        background: CARD, borderRadius: 8, padding: 16,

          <span style={{ fontSize: 18, fontWeight: 700, color: TEXT }}>{data.name}</span>

        <div style={{ textAlign: "right" }}>
          <div style={{ fontFamily: "monospace", fontSize: 20, fontWeight: 700, color: GREEN }}>{data.indexLevel}</div>

            {data.indexName} · YTD {data.indexYtd} · 1月 {data.indexJan}
          </div>
        </div>
      </div>

      {/* Dependency bars */}
      <div style={{ background: CARD, borderRadius: 8, padding: 16, border: `1px solid ${BORDER}` }}>
        <div style={{ fontSize: 11, color: GOLD, fontFamily: "monospace", letterSpacing: 1, marginBottom: 12 }}>
          能源依赖度
        </div>
        {data.bars.map((b, i) => (
          <div key={i}
            onClick={() => setExpanded(expanded === i ? null : i)}
            style={{ cursor: "pointer", marginBottom: expanded === i ? 12 : 8 }}
          >
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
              <span style={{ fontSize: 13, color: TEXT }}>{b.k}</span>
              <span style={{ fontFamily: "monospace", fontSize: 14, fontWeight: 700, color: b.v > 60 ? RED : b.v > 30 ? ORANGE : TEXT }}>
                {b.v}{b.unit}
              </span>
            </div>
            <div style={{ height: 6, background: "rgba(255,255,255,0.04)", borderRadius: 3, overflow: "hidden" }}>
              <div style={{
                height: "100%",
                width: animated ? `${Math.min(b.v, 100)}%` : "0%",
                background: b.v > 60
                  ? `linear-gradient(90deg, ${RED}, ${RED}88)`
                  : b.v > 30
                    ? `linear-gradient(90deg, ${ORANGE}, ${ORANGE}88)`
                    : `linear-gradient(90deg, ${BLUE}, ${BLUE}88)`,
                borderRadius: 3,
                transition: "width 0.8s cubic-bezier(0.22,1,0.36,1)",
                transitionDelay: `${i * 0.1}s`,
              }} />
            </div>
            {expanded === i && (
              <div style={{ fontSize: 11, color: TEXT_DIM, marginTop: 4, paddingLeft: 8, borderLeft: `2px solid ${BORDER}` }}>
                {b.src}
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Reserves */}
      <div style={{ background: CARD, borderRadius: 8, padding: 16, border: `1px solid ${BORDER}` }}>
        <div style={{ fontSize: 11, color: GOLD, fontFamily: "monospace", letterSpacing: 1, marginBottom: 12 }}>
          储备与缓冲
        </div>
        {data.reserves.map((r, i) => (
          <div key={i} style={{
            padding: "10px 0",
            borderBottom: i < data.reserves.length - 1 ? `1px solid ${BORDER}` : "none",
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 13, color: TEXT }}>{r.k}</span>
              <span style={{
                fontFamily: "monospace", fontSize: 15, fontWeight: 700,
                color: r.danger ? RED : GREEN,
              }}>
                {r.v}
              </span>
            </div>
            <div style={{ fontSize: 11, color: TEXT_DIM, marginTop: 2 }}>{r.sub}</div>
          </div>
        ))}
      </div>

      {/* Macro impact */}
      <div style={{ background: CARD, borderRadius: 8, padding: 16, border: `1px solid ${BORDER}` }}>
        <div style={{ fontSize: 11, color: GOLD, fontFamily: "monospace", letterSpacing: 1, marginBottom: 12 }}>
          宏观传导
        </div>
        {data.macro.map((m, i) => (
          <div key={i} style={{
            display: "flex", justifyContent: "space-between", alignItems: "flex-start",
            padding: "8px 0",
            borderBottom: i < data.macro.length - 1 ? `1px solid ${BORDER}` : "none",
          }}>
            <div>
              <div style={{ fontSize: 13, color: TEXT }}>{m.k}</div>
              {m.sub && <div style={{ fontSize: 11, color: TEXT_DIM, marginTop: 1 }}>{m.sub}</div>}
            </div>
            <span style={{
              fontFamily: "monospace", fontSize: 14, fontWeight: 600,
              color: m.danger ? RED : TEXT,
              whiteSpace: "nowrap", marginLeft: 12,
            }}>
              {m.v}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}
