<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S₂ 宏观雷达 | 黑森船长</title>
<meta name="description" content="S₂六维宏观监控系统 — 信用韧性、制度稳定、情绪反馈、市场协调、叙事共识、技术动能的定性监控仪表盘">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f172a;
  --bg2: #1e293b;
  --card: #1e293b;
  --border: #334155;
  --text: #e2e8f0;
  --dim: #94a3b8;
  --muted: #64748b;
  --gold: #d4a853;
  --green: #22c55e;
  --blue: #3b82f6;
  --amber: #f59e0b;
  --red: #ef4444;
  --purple: #8b5cf6;
  --sans: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --mono: 'Menlo', 'Consolas', monospace;
}
html, body { width: 100%; overflow-x: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Navigation */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(15,23,42,0.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 10px 20px;
  display: flex; align-items: center; gap: 12px;
}
.nav-back {
  color: var(--dim); font-size: 13px; text-decoration: none;
  padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px;
  transition: all 0.2s;
}
.nav-back:hover { color: var(--gold); border-color: var(--gold); }
.nav-brand { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-left: auto; }

/* Container */
.wrap { max-width: 880px; margin: 0 auto; padding: 24px 16px 60px; }

/* Status banner */
.status-banner {
  border-radius: 12px; padding: 20px 24px;
  margin-bottom: 24px; position: relative; overflow: hidden;
}
.status-banner::before {
  content: ''; position: absolute; inset: 0;
  background: inherit; opacity: 0.12; z-index: 0;
}
.status-top { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; position: relative; z-index: 1; }
.status-state {
  font-size: 28px; font-weight: 700; letter-spacing: 1px;
}
.status-attractor {
  display: flex; align-items: center; gap: 6px;
  font-size: 14px; color: var(--dim);
  background: rgba(0,0,0,0.3); padding: 4px 14px; border-radius: 20px;
}
.status-attractor .emoji { font-size: 18px; }
.status-meta {
  position: relative; z-index: 1;
  display: flex; flex-wrap: wrap; gap: 16px; margin-top: 14px;
  font-size: 12px; color: var(--dim);
}
.status-meta-item { display: flex; align-items: center; gap: 5px; }
.status-meta-item .label { color: var(--muted); }
.warning-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(239,68,68,0.15); color: var(--red);
  padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 500;
}

/* Section title */
.sec { margin-bottom: 24px; }
.sec-head {
  font-size: 14px; font-weight: 600; color: var(--dim);
  margin-bottom: 12px; letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 8px;
}
.sec-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Dimension cards */
.dims-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
}
@media (max-width: 768px) { .dims-grid { grid-template-columns: 1fr; } }
.dim-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; position: relative;
  transition: border-color 0.2s;
}
.dim-card:hover { border-color: rgba(255,255,255,0.12); }
.dim-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.dim-name { font-size: 13px; font-weight: 600; color: var(--text); }
.dim-arrow { font-size: 16px; }
.dim-level {
  display: inline-block;
  font-size: 18px; font-weight: 700;
  margin-bottom: 6px;
}
.dim-note { font-size: 11px; color: var(--muted); line-height: 1.5; }
.dim-bar {
  margin-top: 8px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.06); overflow: hidden;
}
.dim-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease-out; }

/* Level colors */
.lv-robust { color: var(--green); }
.lv-healthy { color: var(--blue); }
.lv-neutral { color: var(--dim); }
.lv-stressed { color: var(--amber); }
.lv-deteriorating { color: var(--red); }
.bar-robust { background: var(--green); }
.bar-healthy { background: var(--blue); }
.bar-neutral { background: var(--muted); }
.bar-stressed { background: var(--amber); }
.bar-deteriorating { background: var(--red); }

/* Metrics */
.metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
@media (max-width: 768px) { .metrics-grid { grid-template-columns: 1fr; } }
.metric-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px;
}
.metric-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.metric-value { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.metric-pct-wrap {
  display: flex; align-items: center; gap: 8px; margin-top: 8px;
}
.metric-pct-bar {
  flex: 1; height: 6px; border-radius: 3px;
  background: rgba(255,255,255,0.06); overflow: hidden;
}
.metric-pct-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease-out; }
.metric-pct-text { font-size: 10px; color: var(--muted); font-family: var(--mono); white-space: nowrap; }
.metric-desc { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
.extreme-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(239,68,68,0.12); color: var(--red);
  padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
  margin-top: 8px;
}
.extreme-cats { font-size: 11px; color: var(--muted); margin-top: 6px; }

/* Opportunities */
.opp-list { display: flex; flex-direction: column; gap: 8px; }
.opp-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px;
  display: flex; align-items: flex-start; gap: 12px;
  transition: border-color 0.2s;
}
.opp-item.active { border-left: 3px solid var(--green); }
.opp-item.inactive { opacity: 0.5; }
.opp-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.opp-body { flex: 1; }
.opp-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.opp-desc { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.opp-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.opp-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 4px;
  font-family: var(--mono);
}
.opp-tag.asym { background: rgba(212,168,83,0.15); color: var(--gold); }
.opp-tag.reason { background: rgba(34,197,94,0.12); color: var(--green); }

/* Contradiction */
.contra-card {
  background: var(--card); border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  border-radius: 10px; padding: 20px;
}
.contra-title { font-size: 16px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
.contra-thesis { font-size: 13px; color: var(--dim); line-height: 1.7; margin-bottom: 8px; }
.contra-metaphor { font-size: 12px; color: var(--muted); font-style: italic; }

/* Footer */
.page-footer {
  text-align: center; padding: 32px 0 16px;
  border-top: 1px solid var(--border); margin-top: 32px;
}
.footer-brand { font-size: 13px; color: var(--gold); letter-spacing: 2px; margin-bottom: 8px; }
.footer-disclaimer { font-size: 10px; color: var(--muted); line-height: 1.8; }
.footer-links { margin-top: 12px; display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
.footer-links a {
  font-size: 11px; color: var(--dim); text-decoration: none;
  padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px;
  transition: all 0.2s;
}
.footer-links a:hover { color: var(--gold); border-color: var(--gold); }

/* Loading / empty */
.loading-state {
  text-align: center; padding: 80px 20px;
  color: var(--muted); font-size: 14px;
}
.loading-state .pulse {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold); margin-right: 8px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.4s ease-out both; }
.fade-up-1 { animation-delay: 0.05s; }
.fade-up-2 { animation-delay: 0.1s; }
.fade-up-3 { animation-delay: 0.15s; }
.fade-up-4 { animation-delay: 0.2s; }
.fade-up-5 { animation-delay: 0.25s; }
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-back">← 返回工具箱</a>
  <span class="nav-brand">S₂ MACRO RADAR</span>
</nav>

<div class="wrap" id="app">
  <div class="loading-state" id="loading">
    <span class="pulse"></span>正在加载 S₂ 宏观雷达数据...
  </div>
</div>

<script>
(async function() {
  const app = document.getElementById('app');
  const loading = document.getElementById('loading');

  // Level → style mapping
  const LEVEL_STYLE = {
    '强健': { cls: 'robust', pct: 95 },
    '健康': { cls: 'healthy', pct: 75 },
    '中性': { cls: 'neutral', pct: 50 },
    '承压': { cls: 'stressed', pct: 30 },
    '恶化': { cls: 'deteriorating', pct: 10 },
  };

  // Dimension full names
  const DIM_LABELS = {
    R: '信用韧性', I: '制度稳定', F: '情绪反馈',
    C: '市场协调', N: '叙事共识', T: '技术动能',
  };

  function esc(s) { return String(s || '').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  function pctColor(p) {
    if (p >= 70) return 'var(--red)';
    if (p >= 40) return 'var(--amber)';
    return 'var(--green)';
  }

  function metricColor(v, metric) {
    if (metric === 'vix') return v > 25 ? 'var(--red)' : v > 18 ? 'var(--amber)' : 'var(--green)';
    if (metric === 'credit_spread') return v > 5 ? 'var(--red)' : v > 3.5 ? 'var(--amber)' : 'var(--green)';
    if (metric === 'consumer') return v < 70 ? 'var(--red)' : v < 90 ? 'var(--amber)' : 'var(--green)';
    return 'var(--dim)';
  }

  let data;
  try {
    const resp = await fetch('data/s2-radar.json?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    data = await resp.json();
  } catch(e) {
    loading.innerHTML = '<p style="color:var(--muted)">S₂ 雷达数据暂不可用</p>'
      + '<p style="color:var(--muted);font-size:12px;margin-top:8px">数据文件尚未生成或加载失败，请稍后刷新</p>';
    return;
  }

  // Build page
  const ss = data.system_state || {};
  const dims = data.dimensions || {};
  const att = data.attractor || {};
  const km = data.key_metrics || {};
  const opps = data.opportunities || [];
  const contra = data.contradiction;
  const extremes = data.extremes || {};
  const ts = data.timestamp || '';

  // Format timestamp
  const tsDisplay = ts ? ts.replace('T', ' ').slice(0, 16) : '—';

  // Early warning
  const ew = att.early_warning || '无';
  const hasWarning = ew !== '无' && ew !== '';

  let html = '';

  // ── 1. Status Banner ──
  html += '<div class="status-banner fade-up" style="background:' + esc(ss.color || '#334155') + '">'
    + '<div class="status-top">'
    + '<span class="status-state" style="color:#fff">' + esc(ss.label || '未知') + '</span>'
    + '<span class="status-attractor"><span class="emoji">' + esc(att.captured_emoji || '⚪') + '</span>' + esc(att.captured_name || '—') + '</span>'
    + '</div>'
    + '<div class="status-meta">';

  if (att.moving_toward) {
    html += '<span class="status-meta-item"><span class="label">运动方向</span>→ ' + esc(att.moving_toward) + '</span>';
  }
  if (att.secondary) {
    html += '<span class="status-meta-item"><span class="label">次要吸引子</span>' + esc(att.secondary) + '</span>';
  }
  html += '<span class="status-meta-item"><span class="label">数据时间</span>' + esc(tsDisplay) + '</span>';

  if (hasWarning) {
    html += '<span class="warning-badge">⚠ ' + esc(ew) + '</span>';
  }
  html += '</div></div>';

  // ── 2. Dimension Cards ──
  html += '<div class="sec fade-up fade-up-1"><div class="sec-head">六维雷达</div>'
    + '<div class="dims-grid">';

  for (const key of ['R', 'I', 'F', 'C', 'N', 'T']) {
    const d = dims[key] || {};
    const level = d.level || '中性';
    const ls = LEVEL_STYLE[level] || LEVEL_STYLE['中性'];
    const arrow = d.state || '►';
    const note = d.note || '';
    const label = d.name_cn || DIM_LABELS[key] || key;

    html += '<div class="dim-card">'
      + '<div class="dim-header"><span class="dim-name">' + esc(key) + ' · ' + esc(label) + '</span>'
      + '<span class="dim-arrow">' + esc(arrow) + '</span></div>'
      + '<div class="dim-level lv-' + ls.cls + '">' + esc(level) + '</div>'
      + '<div class="dim-note">' + esc(note) + '</div>'
      + '<div class="dim-bar"><div class="dim-bar-fill bar-' + ls.cls + '" style="width:' + ls.pct + '%"></div></div>'
      + '</div>';
  }
  html += '</div></div>';

  // ── 3. Key Metrics ──
  if (km.vix || km.credit_spread || km.consumer) {
    html += '<div class="sec fade-up fade-up-2"><div class="sec-head">关键市场指标</div>'
      + '<div class="metrics-grid">';

    if (km.vix && km.vix.value != null) {
      const v = km.vix;
      const pct = v.percentile || 0;
      html += '<div class="metric-card">'
        + '<div class="metric-label">VIX 恐慌指数</div>'
        + '<div class="metric-value" style="color:' + metricColor(v.value, 'vix') + '">' + v.value + '</div>'
        + '<div class="metric-pct-wrap">'
        + '<div class="metric-pct-bar"><div class="metric-pct-fill" style="width:' + pct + '%;background:' + pctColor(pct) + '"></div></div>'
        + '<span class="metric-pct-text">' + pct + '%</span>'
        + '</div>'
        + '<div class="metric-desc">' + esc(v.desc) + '</div></div>';
    }

    if (km.credit_spread && km.credit_spread.value != null) {
      const v = km.credit_spread;
      const pct = v.percentile || 0;
      html += '<div class="metric-card">'
        + '<div class="metric-label">高收益债利差</div>'
        + '<div class="metric-value" style="color:' + metricColor(v.value, 'credit_spread') + '">' + v.value + '%</div>'
        + '<div class="metric-pct-wrap">'
        + '<div class="metric-pct-bar"><div class="metric-pct-fill" style="width:' + pct + '%;background:' + pctColor(pct) + '"></div></div>'
        + '<span class="metric-pct-text">' + pct + '%</span>'
        + '</div>'
        + '<div class="metric-desc">' + esc(v.desc) + '</div></div>';
    }

    if (km.consumer && km.consumer.value != null) {
      const v = km.consumer;
      const pct = v.percentile || 0;
      html += '<div class="metric-card">'
        + '<div class="metric-label">消费者信心</div>'
        + '<div class="metric-value" style="color:' + metricColor(v.value, 'consumer') + '">' + v.value + '</div>'
        + '<div class="metric-pct-wrap">'
        + '<div class="metric-pct-bar"><div class="metric-pct-fill" style="width:' + pct + '%;background:' + pctColor(pct) + '"></div></div>'
        + '<span class="metric-pct-text">' + pct + '%</span>'
        + '</div>'
        + '<div class="metric-desc">' + esc(v.desc) + '</div></div>';
    }

    html += '</div>';

    // Extreme indicators
    if (extremes.count > 0) {
      html += '<div style="margin-top:12px">'
        + '<span class="extreme-badge">&#9888; ' + extremes.count + ' 个极端指标</span>';
      if (extremes.categories && extremes.categories.length) {
        html += '<div class="extreme-cats">' + extremes.categories.map(c => esc(c)).join(' · ') + '</div>';
      }
      html += '</div>';
    }

    html += '</div>';
  }

  // ── 4. Structural Opportunities ──
  if (opps.length) {
    html += '<div class="sec fade-up fade-up-3"><div class="sec-head">结构性机会</div>'
      + '<div class="opp-list">';

    for (const o of opps) {
      const isActive = o.active;
      const icon = isActive ? '&#9679;' : '&#9675;';
      html += '<div class="opp-item ' + (isActive ? 'active' : 'inactive') + '">'
        + '<span class="opp-icon" style="color:' + (isActive ? 'var(--green)' : 'var(--muted)') + '">' + icon + '</span>'
        + '<div class="opp-body">'
        + '<div class="opp-name">' + esc(o.name) + '</div>'
        + '<div class="opp-desc">' + esc(o.desc) + '</div>'
        + '<div class="opp-tags">'
        + '<span class="opp-tag asym">不对称性: ' + esc(o.asymmetry) + '</span>';
      if (isActive && o.reason) {
        html += '<span class="opp-tag reason">' + esc(o.reason) + '</span>';
      }
      html += '</div></div></div>';
    }
    html += '</div></div>';
  }

  // ── 5. Core Contradiction ──
  if (contra && contra.title) {
    html += '<div class="sec fade-up fade-up-4"><div class="sec-head">核心矛盾</div>'
      + '<div class="contra-card">'
      + '<div class="contra-title">' + esc(contra.title) + '</div>'
      + '<div class="contra-thesis">' + esc(contra.thesis) + '</div>';
    if (contra.metaphor) {
      html += '<div class="contra-metaphor">"' + esc(contra.metaphor) + '"</div>';
    }
    html += '</div></div>';
  }

  // ── 6. Footer ──
  html += '<div class="page-footer fade-up fade-up-5">'
    + '<div class="footer-brand">黑森船长 | 独立资本投资决策系统</div>'
    + '<div class="footer-disclaimer">'
    + '数据每日更新 | 所有分析仅供参考，不构成投资建议<br>'
    + 'S₂ 系统基于人类确定性理论（HCT）六维框架 | Not investment advice'
    + '</div>'
    + '<div class="footer-links">'
    + '<a href="index.html">工具箱首页</a>'
    + '<a href="certainty-map.html">确定性地图</a>'
    + '<a href="weekly.html">宏观总览</a>'
    + '<a href="gear.html">齿轮系统</a>'
    + '</div></div>';

  loading.style.display = 'none';
  app.insertAdjacentHTML('beforeend', html);
})();
</script>

</body>
</html>
