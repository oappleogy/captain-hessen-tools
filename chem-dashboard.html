const ScoreBar=({v,color="#3b82f6"})=>(
  <div style={{display:"flex",gap:1,alignItems:"center"}}>
    {[1,2,3,4,5].map(i=><div key={i} style={{width:9,height:9,borderRadius:2,background:i<=v?color:"#e2e8f0"}}/>)}

  </div>
);

const Radar=({scores,color="#3b82f6"})=>{
  const n=7,cx=58,cy=58,r=44;
  const ag=scores.map((_,i)=>(Math.PI*2*i/n)-Math.PI/2);
  const pts=scores.map((s,i)=>({x:cx+Math.cos(ag[i])*r*(s/5),y:cy+Math.sin(ag[i])*r*(s/5)}));
  const gp=l=>ag.map(a=>({x:cx+Math.cos(a)*r*(l/5),y:cy+Math.sin(a)*r*(l/5)}));
  return(
    <svg viewBox="0 0 116 116" style={{width:105,height:105,flexShrink:0}}>
      {[2,4,5].map(l=>{const g=gp(l);return <polygon key={l} points={g.map(p=>p.x+","+p.y).join(" ")} fill="none" stroke="#e2e8f0" strokeWidth={l===5?.5:.3}/>;})}
      {ag.map((a,i)=><line key={i} x1={cx} y1={cy} x2={cx+Math.cos(a)*r} y2={cy+Math.sin(a)*r} stroke="#f1f5f9" strokeWidth={.3}/>)}
      <polygon points={pts.map(p=>p.x+","+p.y).join(" ")} fill={color+"22"} stroke={color} strokeWidth={1.5}/>
      {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={1.8} fill={color}/>)}
      {ag.map((a,i)=>{const x=cx+Math.cos(a)*(r+9),y=cy+Math.sin(a)*(r+9);return <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="central" fontSize={6.5} fill="#94a3b8">{DS[i]}</text>;})}
    </svg>
  );
};

        </div>}

        {tab==="strategy"&&<div style={{animation:"fu .4s"}}>
          <div style={{fontSize:10,color:"#64748b",marginBottom:8}}>LPG从T1降至T2(政策天花板)，苯乙烯/纯苯因低政策风险优先级提升</div>
          {STRATS.map((g,i)=>{const t=TIERS[g.tier];return <div key={i} style={{marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
              <span style={{fontSize:10,fontWeight:800,color:t.color,padding:"2px 7px",background:t.bg,borderRadius:4}}>{t.label}</span>
              <span style={{fontSize:9,color:"#94a3b8"}}>{t.desc}</span>
            </div>
            {g.items.map((it,j)=><div key={j} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,padding:10,marginBottom:4}}>
              <div style={{fontSize:12,fontWeight:700,marginBottom:5}}>{it.n}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px 8px",fontSize:10,color:"#475569",lineHeight:1.5}}>
                <div><span style={{color:"#94a3b8",fontSize:9}}>短线策略</span><br/>{it.sh}</div>
                <div><span style={{color:"#94a3b8",fontSize:9}}>中线策略</span><br/>{it.mid}</div>
                <div><span style={{color:it.w.includes("⚠️")?"#dc2626":"#94a3b8",fontSize:9}}>政策预警</span><br/><span style={{color:it.w.includes("⚠️")?"#dc2626":"inherit"}}>{it.w}</span></div>
                <div><span style={{color:"#dc2626",fontSize:9}}>硬止损</span><br/><span style={{color:"#dc2626"}}>{it.st}</span></div>
              </div>
            </div>)}
          </div>;})}
        </div>}

        {tab==="blind"&&<div style={{animation:"fu .4s"}}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:8}}>框架盲区与压力测试</div>
          {BLINDS.map((b,i)=><div key={i} style={{background:"#fff",border:"1px solid "+(b.l==="🔴"?"#fca5a5":b.l==="🟠"?"#fed7aa":"#e2e8f0"),borderRadius:8,padding:10,marginBottom:5}}>
            <div style={{fontSize:12,fontWeight:700,marginBottom:3}}>{b.t}</div>
            <div style={{fontSize:10,color:"#475569",lineHeight:1.6,marginBottom:4}}>{b.d}</div>
            <div style={{padding:"5px 8px",background:"#f8fafc",borderRadius:4,borderLeft:"2px solid #3b82f6"}}>
              <div style={{fontSize:9,color:"#3b82f6",fontWeight:600}}>监控指标</div>
              <div style={{fontSize:10,color:"#64748b",lineHeight:1.5}}>{b.m}</div>
            </div>
          </div>)}
        </div>}
      </main>

      <footer style={{textAlign:"center",padding:"10px",background:"#f0f4f8",borderTop:"1px solid #e2e8f0"}}>
        <div style={{fontSize:8,color:"#94a3b8"}}>黑森船长 · Captain Hessen · 数据截至2026年3月 · 仅供分析框架参考，不构成投资建议</div>
      </footer>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
