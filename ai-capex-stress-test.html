function RiskGauge({ value, max, label, color, unit = "x" }) {
  const pct = Math.min(Math.abs(value) / max * 100, 100);
  const danger = value > max * 0.7;
  const warning = value > max * 0.5;
  return (
    <div style={{ marginBottom: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#64748b", marginBottom: 3 }}>
        <span>{label}</span>
        <span style={{ color: danger ? "#dc2626" : warning ? "#d97706" : "#16a34a", fontWeight: 700 }}>
          {typeof value === "number" ? (value >= 0 ? value.toFixed(2) : value.toFixed(1)) : value}{unit}
        </span>
      </div>
      <div style={{ height: 6, background: "rgba(0,0,0,0.06)", borderRadius: 3, overflow: "hidden" }}>
        <div style={{
          width: `${pct}%`, height: "100%", borderRadius: 3,
          background: danger ? "#dc2626" : warning ? "#d97706" : color,
          transition: "width 0.6s ease", opacity: 0.7,
        }} />
      </div>
    </div>
  );
}

function FundingPie({ sources }) {
  const items = [
    { key: "cashFlow", label: "经营现金流", c: "#16a34a" },
    { key: "cash", label: "现金储备", c: "#2563eb" },
    { key: "debt", label: "发债", c: "#d97706" },
    { key: "spv", label: "表外SPV", c: "#dc2626" },
    { key: "equity", label: "增发股票", c: "#7c3aed" },
    { key: "buybackRedirect", label: "回购削减", c: "#059669" },
  ].filter(i => sources[i.key] > 0);
  let cumAngle = 0;
  const paths = items.map((item, idx) => {
    const angle = (sources[item.key] / 100) * 360;
    const startAngle = cumAngle; cumAngle += angle; const endAngle = cumAngle;
    const startRad = (startAngle - 90) * Math.PI / 180;
    const endRad = (endAngle - 90) * Math.PI / 180;
    const largeArc = angle > 180 ? 1 : 0;
    const x1 = 50 + 40 * Math.cos(startRad), y1 = 50 + 40 * Math.sin(startRad);
    const x2 = 50 + 40 * Math.cos(endRad), y2 = 50 + 40 * Math.sin(endRad);
    return <path key={idx} d={`M50,50 L${x1},${y1} A40,40 0 ${largeArc},1 ${x2},${y2} Z`} fill={item.c} opacity={0.7} />;
  });
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6 }}>
      <svg viewBox="0 0 100 100" width="64" height="64">{paths}</svg>
      <div style={{ fontSize: 10, lineHeight: 1.6 }}>
        {items.map((item, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ width: 8, height: 8, borderRadius: 2, background: item.c, display: "inline-block", flexShrink: 0 }} />
            <span style={{ color: "#64748b" }}>{item.label} {sources[item.key]}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function CompanyCard({ company, scenario, expanded, onToggle }) {
  const c = company;
  const ocfAdj = c.operatingCashFlow * (1 + scenario.revenueShock / 100 * 0.8);
  const capexRatio = c.capex2026E / ocfAdj;
  const interestCostStress = c.totalDebt * (0.045 + scenario.rateShock / 100);
  const fcfStress = ocfAdj - c.capex2026E;
  const debtServiceCoverage = ocfAdj / Math.max(interestCostStress, 1);
  const isDanger = capexRatio > 1.5 || debtServiceCoverage < 3 || c.ratingScore <= 5;
  const isWarning = capexRatio > 1.1 || debtServiceCoverage < 5;

  return (
    <div style={{
      background: "#fff", border: `1px solid ${isDanger ? "rgba(220,38,38,0.2)" : isWarning ? "rgba(217,119,6,0.15)" : "rgba(59,130,246,0.1)"}`,

            <div style={{ color: "#64748b", fontSize: 11 }}>{c.ticker} · 评级 <span style={{ color: c.ratingScore >= 9 ? "#16a34a" : c.ratingScore >= 7 ? "#2563eb" : c.ratingScore >= 5 ? "#d97706" : "#dc2626", fontWeight: 700 }}>{c.creditRating}</span></div>

        <div style={{ display: "inline-block", padding: "3px 10px", borderRadius: 6, fontSize: 11, fontWeight: 700,
          background: isDanger ? "rgba(220,38,38,0.08)" : isWarning ? "rgba(217,119,6,0.08)" : "rgba(22,163,74,0.08)",
          color: isDanger ? "#dc2626" : isWarning ? "#d97706" : "#16a34a" }}>
          {isDanger ? "高风险" : isWarning ? "关注" : "稳健"}
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 12 }}>
        {[
          { label: "营收", value: `$${c.revenue}B`, sub: `NI $${c.netIncome}B` },
          { label: "经营现金流", value: `$${c.operatingCashFlow}B`, sub: `FCF $${c.freeCashFlow}B` },
          { label: "2026E Capex", value: `$${c.capex2026E}B`, sub: `vs 2025 $${c.capex2025}B` },
          { label: "总债务", value: `$${c.totalDebt}B`, sub: c.spvAmount > 0 ? `+SPV $${c.spvAmount}B` : `现金 $${c.cashHoard}B` },
        ].map((m, i) => (
          <div key={i} style={{ background: "rgba(0,0,0,0.02)", borderRadius: 8, padding: "8px 10px" }}>
            <div style={{ color: "#94a3b8", fontSize: 9, marginBottom: 3 }}>{m.label}</div>
            <div style={{ color: "#0f172a", fontWeight: 700, fontSize: 14, fontFamily: mono }}>{m.value}</div>
            <div style={{ color: "#94a3b8", fontSize: 9, marginTop: 2 }}>{m.sub}</div>
          </div>
        ))}
      </div>

      <RiskGauge value={capexRatio} max={3} label="Capex/OCF (压力后)" color={c.color} />
      <RiskGauge value={c.debtToOCF} max={8} label="债务/OCF" color={c.color} />
      <RiskGauge value={debtServiceCoverage} max={25} label="利息覆盖率 (越高越安全)" color="#16a34a" />

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginTop: 8 }}>
        <div>
          <div style={{ color: "#94a3b8", fontSize: 10, marginBottom: 4 }}>融资来源构成 (估算)</div>
          <FundingPie sources={c.fundingSources} />
        </div>
        <div style={{ textAlign: "right", maxWidth: 180 }}>
          <div style={{ color: "#94a3b8", fontSize: 10, marginBottom: 4 }}>压力后FCF</div>
          <div style={{ color: fcfStress < 0 ? "#dc2626" : "#16a34a", fontSize: 20, fontWeight: 800, fontFamily: mono }}>
            {fcfStress > 0 ? "+" : ""}{fcfStress.toFixed(0)}B
          </div>
          <div style={{ color: "#94a3b8", fontSize: 9, marginTop: 2 }}>{c.buybackCut}</div>
        </div>
      </div>

      <div style={{
        marginTop: 10, padding: "8px 10px", borderRadius: 6,
        background: isDanger ? "rgba(220,38,38,0.04)" : "rgba(37,99,235,0.04)",

          <BondTable bonds={c.bonds} />
        </div>
      )}

  );
}

          <div style={{ color: "#475569", fontSize: 11, lineHeight: 1.7 }}>
            1. Q1单季五家合计capex <b style={{color:"#dc2626"}}>$112B</b>，全年指引上调至$760B(含涨价因素$25B+)<br/>
            2. Amazon TTM FCF暴跌<b style={{color:"#dc2626"}}>95%</b>至仅$1.2B，Alphabet Q1 FCF下降47%<br/>
            3. Oracle FCF恶化至<b style={{color:"#dc2626"}}>-$24.7B</b>(TTM)，Barclays警告现金可能11月耗尽<br/>
            4. MSFT总债务从$72B翻倍至<b style={{color:"#dc2626"}}>$125B</b>，capex指引从$148B暴涨至$190B
          </div>
        </div>

        <div style={{ marginBottom: 16 }}>
          <div style={{ color: "#64748b", fontSize: 11, marginBottom: 8, fontWeight: 600 }}>选择压力情景</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 6 }}>
            {STRESS_SCENARIOS.map((s, i) => (
              <button key={s.id} onClick={() => setScenarioIdx(i)} style={{
                padding: 10, borderRadius: 8, border: scenarioIdx === i ? "1px solid #d97706" : "1px solid rgba(59,130,246,0.1)",
                background: scenarioIdx === i ? "rgba(217,119,6,0.06)" : "#fff",
                cursor: "pointer", textAlign: "left",
              }}>
                <div style={{ color: scenarioIdx === i ? "#d97706" : "#64748b", fontSize: 12, fontWeight: 700 }}>{s.name}</div>
                <div style={{ color: "#94a3b8", fontSize: 9, marginTop: 3, lineHeight: 1.4 }}>{s.description}</div>
              </button>
            ))}
          </div>
        </div>

        {scenarioIdx > 0 && (
          <div style={{ display: "flex", gap: 8, marginBottom: 16, padding: 10, background: "#fff", borderRadius: 8, border: "1px solid rgba(59,130,246,0.1)" }}>
            {[
              { label: "收入冲击", value: `${scenario.revenueShock}%`, color: "#dc2626" },
              { label: "利率上行", value: `+${scenario.rateShock}%`, color: "#d97706" },
              { label: "利差扩大", value: `+${(scenario.spreadShock * 100).toFixed(0)}bp`, color: "#7c3aed" },
            ].map((p, i) => (
              <div key={i} style={{ flex: 1, textAlign: "center" }}>
                <div style={{ color: "#94a3b8", fontSize: 9 }}>{p.label}</div>
                <div style={{ color: p.color, fontSize: 16, fontWeight: 800, fontFamily: mono }}>{p.value}</div>
              </div>
            ))}
          </div>
        )}

        {[...COMPANIES].sort((a, b) => {
          const riskA = a.capex2026E / (a.operatingCashFlow * (1 + scenario.revenueShock / 100 * 0.8));
          const riskB = b.capex2026E / (b.operatingCashFlow * (1 + scenario.revenueShock / 100 * 0.8));
          return riskB - riskA;
        }).map(c => (
          <CompanyCard key={c.name} company={c} scenario={scenario}
            expanded={!!expandedCards[c.name]} onToggle={() => toggleCard(c.name)} />
        ))}

        <div style={{ background: "rgba(220,38,38,0.04)", border: "1px solid rgba(220,38,38,0.12)", borderRadius: 10, padding: 14, marginBottom: 16 }}>
          <div style={{ color: "#dc2626", fontSize: 12, fontWeight: 700, marginBottom: 10 }}>风险触发条件矩阵</div>
          {[
            { trigger: "股市暴跌 >50%", impact: "终结整个AI capex周期", prob: "低但非零" },
            { trigger: "信用利差扩大 >300bp", impact: "Oracle首先丧失市场准入", prob: "中-低" },
            { trigger: "AI变现严重不及预期", impact: "FCF进一步恶化，评级下调连锁", prob: "中" },
            { trigger: "Oracle降至垃圾级 (BB+)", impact: "被迫出售资产，传染效应", prob: "中" },
          ].map((r, i) => (
            <div key={i} style={{ display: "flex", gap: 8, padding: "8px 0", borderBottom: i < 3 ? "1px solid rgba(0,0,0,0.04)" : "none" }}>
              <div style={{ flex: 1 }}>
                <div style={{ color: "#0f172a", fontSize: 11, fontWeight: 600 }}>{r.trigger}</div>
                <div style={{ color: "#94a3b8", fontSize: 10, marginTop: 2 }}>{r.impact}</div>
              </div>
              <div style={{ fontSize: 9, color: "#64748b", padding: "2px 6px", background: "rgba(0,0,0,0.03)", borderRadius: 4, whiteSpace: "nowrap", alignSelf: "flex-start" }}>{r.prob}</div>
            </div>
          ))}
        </div>

        <div style={{ background: "#fff", borderRadius: 10, padding: 14, border: "1px solid rgba(59,130,246,0.1)", marginBottom: 20 }}>
          <div style={{ color: "#2563eb", fontSize: 12, fontWeight: 700, marginBottom: 8 }}>信用风险判断</div>
          <div style={{ color: "#475569", fontSize: 11, lineHeight: 1.8 }}>
            四家巨头(MSFT/AMZN/GOOG/META)的<b style={{color:"#16a34a"}}>信用评级充足</b>（AA-至AAA），短中期内不构成系统性偿债风险。真正的压力测试变量是<b style={{color:"#d97706"}}>AI收入变现速度</b>——当前Capex/OCF已达94%高位，若2027年前AI revenue不能显著起量，FCF将持续恶化，迫使发债规模进一步膨胀。
            <br/><br/>
            关键监控指标：各家<b style={{color:"#dc2626"}}>信用利差变化</b>（尤其Oracle CDS）、季度FCF趋势、新债发行窗口是否收窄。资金循环与反身性风险详见<a href="ai-capex-reflexivity.html" style={{color:"#2563eb"}}>反身性风险地图</a>。
          </div>
        </div>

        <div style={{ textAlign: "center", color: "#94a3b8", fontSize: 9, paddingBottom: 20 }}>
          黑森船长 · AI Capex融资风险分析 · 非投资建议
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
