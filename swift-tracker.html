          {q:"一笔LC涉及多方",a:"开证行/通知行/议付行/保兑行各看一个切面，没有全局视角"},
          {q:"统计主体分散",a:"SWIFT看报文、ICC看银行风险、ADB看缺口、BIS看敞口——各自回答不同的问题"},
          {q:"国家/区域差异大",a:"亚洲55%的贸易用LC(高风险市场)，欧美以Open Account为主"},
          {q:"数字化程度低",a:"贸易融资是银行业最后一个大量依赖纸质文件的领域，数据采集成本高"},
        ].map((x,i)=><div key={i} style={{padding:"5px 0",borderBottom:i<4?"1px solid rgba(234,241,247,0.1)":"none"}}>
          <span style={{fontWeight:700,color:GOLD}}>{x.q}</span>
          <div style={{fontSize:10,opacity:0.8,marginTop:1}}>{x.a}</div>
        </div>)}
      </div>
    </div>
  </div>;
}
