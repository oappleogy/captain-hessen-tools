const sn = "'DM Sans', sans-serif";
const mn = "'JetBrains Mono', monospace";
const SEV = {
  hot: "#2563EB", shift: "#7C3AED", warn: "#D97706",
  danger: "#DC2626", ok: "#64748B",
};

function TimelineChart() {
  const W = 900, H = 520;
  const padL = 70, padR = 30, padT = 30, padB = 40;
  const chartW = W - padL - padR;
  const laneH = (H - padT - padB) / LANES.length;

  const xScale = (year, q = 0.5) => padL + ((year - 2025 + q) / 5) * chartW;
  const yScale = (laneIdx) => padT + laneIdx * laneH + laneH / 2;

  const dangerX1 = xScale(2027, 0);
  const dangerX2 = xScale(2028, 1);

  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: "block" }}>
      <defs>
        <linearGradient id="dangerZone" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#DC2626" stopOpacity="0.06" />
          <stop offset="50%" stopColor="#DC2626" stopOpacity="0.1" />
          <stop offset="100%" stopColor="#DC2626" stopOpacity="0.06" />
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur" />
          <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
      </defs>
      <rect x={dangerX1} y={padT - 10} width={dangerX2 - dangerX1} height={H - padT - padB + 20}
        fill="url(#dangerZone)" rx="8" />
      <text x={(dangerX1 + dangerX2) / 2} y={padT - 2} textAnchor="middle"
        fontSize="9" fontFamily={mn} fill="#DC2626" fontWeight="700" opacity="0.7">
        ⚠ 风险碰撞窗口
      </text>
      {YEARS.map(yr => {
        const x = xScale(yr, 0);
        return (
          <g key={yr}>
            <line x1={x} y1={padT} x2={x} y2={H - padB} stroke="rgba(0,0,0,0.06)" strokeDasharray="4,4" />
            <text x={x} y={H - padB + 16} textAnchor="middle" fontSize="13" fontFamily={sn}
              fontWeight={yr === 2027 || yr === 2028 ? 800 : 600}
              fill={yr === 2027 || yr === 2028 ? "#DC2626" : "#0F172A"}>
              {yr}
            </text>
          </g>
        );
      })}
      {LANES.map((lane, li) => {
        const y = yScale(li);
        return (
          <g key={lane.id}>
            <line x1={padL} y1={y} x2={W - padR} y2={y} stroke={lane.color} strokeWidth="1" opacity="0.12" />
            <text x={padL - 8} y={y + 4} textAnchor="end" fontSize="10" fontFamily={mn}
              fill={lane.color} fontWeight="700">{lane.label}</text>
          </g>
        );
      })}
      {COLLISIONS.map((c, i) => {
        const fromLane = LANES.findIndex(l => l.id === c.from[1]);
        const toLane = LANES.findIndex(l => l.id === c.to[1]);
        const fromEvt = EVENTS.find(e => e.year === c.from[0] && e.lane === c.from[1]);
        const toEvt = EVENTS.find(e => e.year === c.to[0] && e.lane === c.to[1]);
        if (!fromEvt || !toEvt) return null;
        const x1 = xScale(fromEvt.year, fromEvt.q);
        const y1 = yScale(fromLane);
        const x2 = xScale(toEvt.year, toEvt.q);
        const y2 = yScale(toLane);
        return (
          <g key={i}>
            <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="#DC2626" strokeWidth="1.5"
              strokeDasharray="3,3" opacity="0.4" />
            <text x={(x1 + x2) / 2 + 6} y={(y1 + y2) / 2 - 5} fontSize="8" fontFamily={mn}
              fill="#DC2626" fontWeight="600" opacity="0.7">{c.label}</text>
          </g>
        );
      })}
      {EVENTS.map((evt, i) => {
        const laneIdx = LANES.findIndex(l => l.id === evt.lane);
        const x = xScale(evt.year, evt.q);
        const y = yScale(laneIdx);
        const color = SEV[evt.severity];
        const isDanger = evt.severity === "danger";
        const r = isDanger ? 8 : evt.severity === "shift" ? 7 : 5;
        const lines = evt.text.split("\n");
        return (
          <g key={i}>
            {isDanger && <circle cx={x} cy={y} r={r + 6} fill="none" stroke={color} strokeWidth="1" opacity="0.3">
              <animate attributeName="r" from={r + 3} to={r + 14} dur="2s" repeatCount="indefinite" />
              <animate attributeName="opacity" from="0.4" to="0" dur="2s" repeatCount="indefinite" />
            </circle>}
            <circle cx={x} cy={y} r={r} fill={color} opacity={isDanger ? 0.9 : 0.6}
              filter={isDanger ? "url(#glow)" : undefined} />
            {lines.map((line, li) => (
              <text key={li} x={x} y={y + r + 10 + li * 11}
                textAnchor="middle"
                fontSize={isDanger ? "9" : "8"} fontFamily={mn}
                fill={isDanger ? color : "#475569"} fontWeight={isDanger ? "700" : "500"}>
                {line}
              </text>
            ))}
          </g>
        );
      })}
    </svg>
  );
}

function AreaChart() {
  const W = 900, H = 280;
  const padL = 60, padR = 30, padT = 30, padB = 40;
  const maxVal = 5200;

  const xScale = (year) => padL + ((year - 2024) / 6) * (W - padL - padR);
  const yScale = (val) => padT + (1 - val / maxVal) * (H - padT - padB);

  const trainPath = TRAIN_INF.map((d, i) => `${i === 0 ? "M" : "L"}${xScale(d.year)},${yScale(d.train)}`).join(" ");
  const inferPath = TRAIN_INF.map((d, i) => `${i === 0 ? "M" : "L"}${xScale(d.year)},${yScale(d.infer)}`).join(" ");
  const trainArea = trainPath + ` L${xScale(2030)},${yScale(0)} L${xScale(2024)},${yScale(0)} Z`;
  const inferArea = inferPath + ` L${xScale(2030)},${yScale(0)} L${xScale(2024)},${yScale(0)} Z`;
  const crossX = xScale(2027);

  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: "block" }}>
      <defs>
        <linearGradient id="trainGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#DC2626" stopOpacity="0.5" />
          <stop offset="100%" stopColor="#DC2626" stopOpacity="0.05" />
        </linearGradient>
        <linearGradient id="inferGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#16A34A" stopOpacity="0.5" />
          <stop offset="100%" stopColor="#16A34A" stopOpacity="0.05" />
        </linearGradient>
      </defs>
      {[0, 1000, 2000, 3000, 4000, 5000].map(v => (
        <g key={v}>
          <line x1={padL} y1={yScale(v)} x2={W - padR} y2={yScale(v)} stroke="rgba(0,0,0,0.06)" />
          <text x={padL - 8} y={yScale(v) + 3} textAnchor="end" fontSize="9" fontFamily={mn} fill="#94A3B8">
            ${v === 0 ? "0" : (v / 10) + "0亿"}
          </text>
        </g>
      ))}
      {TRAIN_INF.map(d => (
        <text key={d.year} x={xScale(d.year)} y={H - padB + 18} textAnchor="middle"
          fontSize="11" fontFamily={sn} fontWeight={d.year === 2027 || d.year === 2028 ? 800 : 500}
          fill={d.year === 2028 ? "#DC2626" : "#0F172A"}>
          {d.year}
        </text>
      ))}
      <path d={inferArea} fill="url(#inferGrad)" />
      <path d={trainArea} fill="url(#trainGrad)" />
      <path d={trainPath} fill="none" stroke="#DC2626" strokeWidth="2.5" />
      <path d={inferPath} fill="none" stroke="#16A34A" strokeWidth="2.5" />
      <line x1={crossX} y1={padT} x2={crossX} y2={H - padB} stroke="#7C3AED" strokeWidth="1.5" strokeDasharray="6,4" opacity="0.5" />
      <text x={crossX + 4} y={padT + 12} fontSize="9" fontFamily={mn} fill="#7C3AED" fontWeight="700">2027 交叉</text>
      <circle cx={xScale(2028)} cy={yScale(2200)} r="5" fill="#DC2626" />
      <text x={xScale(2028) + 8} y={yScale(2200) - 6} fontSize="9" fontFamily={mn} fill="#DC2626" fontWeight="700">训练见顶 $2200亿</text>
      <text x={xScale(2028) + 8} y={yScale(2200) + 6} fontSize="8" fontFamily={mn} fill="#DC2626" opacity="0.7">→ 2030年降至$1200亿(-45%)</text>
      <text x={xScale(2030) + 4} y={yScale(4800) + 4} fontSize="9" fontFamily={mn} fill="#16A34A" fontWeight="700">推理 $4800亿</text>
      <text x={xScale(2030) + 4} y={yScale(1200) + 4} fontSize="9" fontFamily={mn} fill="#DC2626" fontWeight="700">训练 $1200亿</text>
      {TRAIN_INF.map(d => (
        <g key={d.year}>
          <circle cx={xScale(d.year)} cy={yScale(d.train)} r="3.5" fill="#DC2626" />
          <circle cx={xScale(d.year)} cy={yScale(d.infer)} r="3.5" fill="#16A34A" />
        </g>
      ))}
      <rect x={padL + 10} y={padT + 4} width="8" height="8" fill="#DC2626" rx="2" opacity="0.7" />
      <text x={padL + 22} y={padT + 12} fontSize="10" fontFamily={sn} fill="#DC2626" fontWeight="600">训练</text>
      <rect x={padL + 56} y={padT + 4} width="8" height="8" fill="#16A34A" rx="2" opacity="0.7" />
      <text x={padL + 68} y={padT + 12} fontSize="10" fontFamily={sn} fill="#16A34A" fontWeight="600">推理</text>
      <text x={padL + 104} y={padT + 12} fontSize="9" fontFamily={mn} fill="#94A3B8">亿美元 · Morgan Stanley</text>
    </svg>
  );
}

                <div style={{ fontSize: "9px", fontFamily: mn, color, fontWeight: 700 }}>{yr}</div>

                <div style={{ fontSize: "10px", color: "#475569", lineHeight: 1.5 }}>{desc}</div>

          </div>
        </div>

        <div style={{
          display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: "10px",
          marginBottom: "20px",
        }}>
          {[
            ["1.6%", "空置率", "历史最低", "#DC2626"],

            <div key={i} style={{
              background: "#fff", borderRadius: "10px", padding: "12px", textAlign: "center",
              border: "1px solid rgba(59,130,246,0.1)", boxShadow: "0 1px 3px rgba(0,0,0,0.04)",
            }}>
              <div style={{ fontSize: "22px", fontWeight: 800, color, fontFamily: sn }}>{val}</div>
              <div style={{ fontSize: "10px", fontFamily: mn, color: "#0F172A", fontWeight: 600 }}>{label}</div>
              <div style={{ fontSize: "9px", fontFamily: mn, color: "#94A3B8" }}>{sub}</div>

        </div>

        <div style={{ marginBottom: "20px" }}>
          <h2 style={{ fontSize: "14px", fontWeight: 800, marginBottom: "10px" }}>
            投资矩阵：短期做紧缺，中期做分化，长期避训练
          </h2>
          <MatrixCards />
        </div>

        <div style={{
          background: "#fff", borderRadius: "12px", padding: "16px",
          border: "1px solid rgba(22,163,74,0.15)",
          boxShadow: "0 2px 8px rgba(0,0,0,0.04)",
          marginBottom: "16px",
        }}>
          <div style={{ fontSize: "11px", fontFamily: mn, color: "#16A34A", fontWeight: 700, marginBottom: "8px" }}>终版判断</div>
          <div style={{ fontSize: "12px", color: "#0F172A", lineHeight: 2 }}>
            这轮AI资本开支周期的终结方式不是"电太贵"或"钱花完了"——而是<strong>推理成本暴降导致训练投入的边际价值归零</strong>。万亿级训练集群是这个时代的"海底光纤"——必要的基础设施，但建设者回报率远低于预期。<br />
            真正的赢家不在供给侧，而在<strong>需求侧的卡位者</strong>——分发渠道(MSFT Copilot)、数据飞轮(META广告AI)、工作流锁定(NOW)。最大的alpha不在判断"开支天花板在哪"，而在判断<strong>"市场在price in哪个阶段"</strong>。当前仍是阶段一共识，阶段二分化的认知切换窗口=交易机会。
          </div>

        <div style={{ textAlign: "center", fontSize: "9px", fontFamily: mn, color: "#94A3B8", padding: "8px 0" }}>
