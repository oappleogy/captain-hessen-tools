a { color:var(--accent); text-decoration:none; }

/* ── Header ── */
header { padding:48px 0 32px; border-bottom:1px solid var(--border); margin-bottom:28px; }

header .back:hover { color:var(--text-0); text-decoration:none; }

/* ── Stats ── */
.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:28px; }
.stat { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
.stat-label { font-size:10px; color:var(--text-2); font-family:var(--mono); text-transform:uppercase; letter-spacing:1px; margin-bottom:3px; }
.stat-val { font-size:24px; font-weight:700; font-family:var(--mono); }

.fbtn { padding:6px 16px; font-size:12px; font-weight:500; border-radius:8px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text-2); transition:all .18s; font-family:var(--sans); }

.card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:10px; }
.card-name { font-size:16px; font-weight:700; }
.card-role { font-size:11px; color:var(--text-2); margin-top:2px; }

.s-plan { background:var(--hot-dim); color:var(--hot); }
.s-rumor { background:var(--purple-dim); color:var(--purple); }
.s-none { background:rgba(255,255,255,.03); color:var(--text-2); }

    <div class="stat"><div class="stat-label">已发币</div><div class="stat-val" style="color:var(--green)">${counts.live}</div></div>
    <div class="stat"><div class="stat-label">计划中</div><div class="stat-val" style="color:var(--hot)">${counts.plan}</div></div>
    <div class="stat"><div class="stat-label">有传闻</div><div class="stat-val" style="color:var(--purple)">${counts.rumor}</div></div>
    <div class="stat"><div class="stat-label">无代币</div><div class="stat-val" style="color:var(--text-2)">${counts.none}</div></div>
  `;
}

function renderCards(){
  const filtered = currentFilter === 'all' ? PROJECTS : PROJECTS.filter(p => p.status === currentFilter);
  document.getElementById('cards-root').innerHTML = filtered.map(p => {
    const s = STATUS_MAP[p.status];
    return `
    <div class="card">
      <div class="card-top">
        <div>
          <div class="card-name">${p.name}</div>
          <div class="card-role">${p.role}</div>
        </div>
        <div class="card-status ${s.cls}">${s.label}</div>
      </div>
      <div class="card-body">${p.desc}</div>
      ${p.token ? `
      <div class="token-row">
        <span class="token-ticker">${p.token.ticker}</span>
        <span class="token-info">${p.token.chain}</span>
        <span class="token-note">${p.token.note}</span>
      </div>` : ''}
      <div style="margin-top:10px; padding:8px 12px; border-radius:8px; background:${p.status==='none'?'rgba(255,255,255,.02)':'var(--hot-dim)'}; font-size:12px; color:${p.status==='none'?'var(--text-2)':'var(--hot)'};">
        <strong style="color:inherit">参与策略：</strong>${p.opportunity}
      </div>
      <div class="card-meta" style="margin-top:10px">
        <span class="tag t-layer">${p.layer}</span>
        ${p.x ? `<a class="x-link" href="https://x.com/${p.x}" target="_blank" rel="noopener">@${p.x}</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

/* ═══════ FILTERS ═══════ */
document.querySelectorAll('.fbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.f;
    renderCards();
  });
});

/* ═══════ INIT ═══════ */
renderStats();
renderCards();
</script>
</body>
</html>
