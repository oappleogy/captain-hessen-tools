              <div style={{position:"absolute",bottom:2,right:4,fontSize:7,color:"#94a3b8"}}>含硫量 →</div>
              <div style={{position:"absolute",top:2,left:4,fontSize:7,color:"#94a3b8"}}>API ↑</div>
              {BENCHMARKS.map((b,i)=>{const x=Math.min(95,Math.max(5,(b.sulfur/4)*100));const y=Math.min(95,Math.max(5,100-(b.api-18)/(46-18)*100));
                return <div key={i} onClick={()=>setSelBM(selBM===i?null:i)} style={{position:"absolute",left:`${x}%`,top:`${y}%`,transform:"translate(-50%,-50%)",cursor:"pointer",zIndex:selBM===i?10:1}}>
                  <div style={{width:selBM===i?14:9,height:selBM===i?14:9,borderRadius:"50%",background:b.color,boxShadow:`0 0 ${selBM===i?8:4}px ${b.color}44`,border:selBM===i?"2px solid #1e40af":"1px solid #fff",transition:"all .15s"}}/>
                  {selBM===i&&<div style={{position:"absolute",top:-16,left:"50%",transform:"translateX(-50%)",fontSize:8,color:"#1e293b",whiteSpace:"nowrap",fontWeight:800,background:"#fff",padding:"0 3px",borderRadius:2}}>{b.name.split("(")[0].trim()}</div>}
                </div>;})}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>
              {BENCHMARKS.map((b,i)=><span key={i} onClick={()=>setSelBM(selBM===i?null:i)} style={{display:"flex",alignItems:"center",gap:2,fontSize:8,color:selBM===i?"#1e293b":"#94a3b8",cursor:"pointer",fontWeight:selBM===i?700:400}}>
                <span style={{width:5,height:5,borderRadius:"50%",background:b.color}}/>{b.name.split("(")[0].trim().split("\n")[0]}
              </span>)}
            </div>
          </div>

          {BENCHMARKS.map((b,i)=>{const sel=selBM===i;
            return <div key={i} onClick={()=>setSelBM(sel?null:i)} style={{background:sel?"#fff":"#fff",border:`1px solid ${sel?b.color+"44":"#e2e8f0"}`,borderRadius:8,padding:"8px 10px",marginBottom:4,cursor:"pointer",transition:"all .15s",boxShadow:sel?`0 2px 8px ${b.color}15`:"none"}}>
              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:b.color}}/>
                <span style={{fontSize:12,fontWeight:700,color:"#1e293b",flex:1}}>{b.name}</span>
                <Pill color={b.cur==="RMB"?"#dc2626":"#2563eb"}>{b.cur}</Pill>
                <span style={{fontSize:9,padding:"1px 5px",borderRadius:3,background:RC[b.hormuz]+"15",color:RC[b.hormuz],fontWeight:600}}>{b.hormuz==="无"||b.hormuz==="无(海峡外)"?"🟢":b.hormuz==="高度依赖"?"🔴":"🟡"} {b.hormuz}</span>
              </div>
              {sel&&<div style={{animation:"fu .2s",marginTop:6,fontSize:11,color:"#475569",lineHeight:1.7}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px 10px"}}>
                  <div><span style={{color:"#94a3b8",fontSize:10}}>交易所</span><br/>{b.exchange}</div>
                  <div><span style={{color:"#94a3b8",fontSize:10}}>结算方式</span><br/>{b.settle}</div>
                  <div><span style={{color:"#94a3b8",fontSize:10}}>原油产地</span><br/>{b.origin}</div>
                  <div><span style={{color:"#94a3b8",fontSize:10}}>油品等级</span><br/>{b.quality} API~{b.api} 含硫{b.sulfur}%</div>
                  <div><span style={{color:"#94a3b8",fontSize:10}}>采购方</span><br/>{b.buyers}</div>
                  <div><span style={{color:"#94a3b8",fontSize:10}}>交割仓储</span><br/>{b.storage}</div>
                  <div style={{gridColumn:"span 2"}}><span style={{color:"#94a3b8",fontSize:10}}>航运线路</span><br/>{b.route}</div>
                </div>
                <div style={{marginTop:4,padding:"5px 8px",background:"#f0f4f8",borderRadius:5,color:b.color,fontSize:10,fontWeight:600,borderLeft:`2px solid ${b.color}`}}>{b.note}</div>
              </div>}
            </div>;})}
        </div>}

        {/* ═══ EXPORT ═══ */}
        {tab==="export"&&<div style={{animation:"fu .4s"}}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:8}}>全球前11大原油出口国 · 出口量/全球占比/主要买家/航运线</div>
          {/* Top 5 share bar */}
          <div style={{background:"#fff",borderRadius:10,padding:12,marginBottom:10,border:"1px solid #e2e8f0"}}>
            <div style={{fontSize:10,color:"#94a3b8",marginBottom:4}}>前5大出口国占全球52%以上</div>
            <Bar data={EXPORTERS.slice(0,5).map(e=>({n:e.name.slice(0,3),p:e.share,c:e.c}))} h={26}/>
          </div>

          {EXPORTERS.map((e,i)=>{const sel=expExp===i;
            return <div key={i} onClick={()=>setExpExp(sel?null:i)} style={{background:"#fff",border:`1px solid ${sel?e.c+"33":"#e2e8f0"}`,borderRadius:8,padding:"10px 12px",marginBottom:4,cursor:"pointer",transition:"all .15s"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:16}}>{e.f}</span>
                <div style={{flex:1}}>
                  <span style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{e.name}</span>
                  <span style={{fontSize:10,color:"#94a3b8",marginLeft:6}}>出口 {e.exp}百万桶/日</span>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:14,fontWeight:800,color:e.c,fontFamily:"monospace"}}>{e.share}%</div>
                  <div style={{fontSize:8,color:"#94a3b8"}}>全球占比</div>
                </div>
              </div>
              {sel&&<div style={{animation:"fu .2s",marginTop:8}}>
                <div style={{fontSize:10,color:"#94a3b8",marginBottom:3}}>出口目的地</div>
                <Bar data={e.dest.map((d,j)=>({...d,c:["#ef4444","#f59e0b","#3b82f6","#22c55e","#8b5cf6","#14b8a6","#6b7280"][j%7]}))} h={20}/>
                <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:3}}>
                  {e.dest.filter(d=>d.p<=8).map((d,j)=><span key={j} style={{fontSize:8,color:"#94a3b8"}}>{d.n} {d.p}%</span>)}
                </div>
                <div style={{fontSize:11,color:"#475569",marginTop:6,lineHeight:1.6}}>
                  <div><span style={{color:"#94a3b8",fontSize:10}}>航运线路</span> {e.route}</div>
                  <div style={{marginTop:2}}><span style={{color:"#94a3b8",fontSize:10}}>霍尔木兹</span> <span style={{color:e.hormuz.includes("不经")?"#16a34a":"#d97706",fontWeight:600}}>{e.hormuz}</span></div>
                  <div style={{marginTop:3,padding:"4px 8px",background:"#f0f4f8",borderRadius:5,fontSize:10,borderLeft:`2px solid ${e.c}`}}>{e.note}</div>
                </div>
              </div>}
            </div>;})}
        </div>}

        {/* ═══ COUNTRY ═══ */}
        {tab==="country"&&<div style={{animation:"fu .4s"}}>
          <div style={{background:"#fff",borderRadius:10,padding:12,marginBottom:10,border:"1px solid #e2e8f0"}}>
            <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:6}}>霍尔木兹脆弱度评分</div>
            {sorted.map(c=><div key={c.name} style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
              <span style={{fontSize:13,width:20}}>{c.f}</span>
              <span style={{width:26,fontSize:10,color:"#64748b",fontWeight:600}}>{c.name}</span>
              <div style={{flex:1,height:14,background:"#e2e8f0",borderRadius:3,overflow:"hidden"}}>
                <div style={{width:`${(c.rs/7)*100}%`,height:"100%",background:`linear-gradient(90deg,${c.c}88,${c.c})`,borderRadius:3,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:3}}>
                  <span style={{fontSize:8,fontWeight:800,color:"#fff",fontFamily:"monospace"}}>{c.rs}</span>
                </div>
              </div>
              <span style={{fontSize:9,color:RC[c.risk],fontWeight:700,width:36,textAlign:"right"}}>{c.risk}</span>
            </div>)}
          </div>

          {COUNTRIES.map((c,i)=>{const exp=expCty===i;const self=Math.round(c.prod/c.cons*100);
            return <div key={i} onClick={()=>setExpCty(exp?null:i)} style={{background:"#fff",border:`1px solid ${exp?c.c+"33":"#e2e8f0"}`,borderRadius:8,padding:10,marginBottom:4,cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:5}}>
                <span style={{fontSize:16}}>{c.f}</span>
                <div style={{flex:1}}><span style={{fontSize:13,fontWeight:700}}>{c.name}</span><span style={{fontSize:9,color:"#94a3b8",marginLeft:4}}>消费{c.cons}|产量{c.prod} 万桶/日</span></div>
                <span style={{padding:"1px 5px",borderRadius:3,fontSize:9,fontWeight:700,background:RC[c.risk]+"15",color:RC[c.risk]}}>{c.risk}</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:3,marginBottom:4}}>
                <Metric label="进口依赖" value={c.imp<0?"净出口":`${c.imp}%`} color={c.imp>80?"#dc2626":c.imp>50?"#d97706":"#16a34a"}/>
                <Metric label="霍尔木兹" value={`${c.hz}%`} color={c.hz>60?"#dc2626":c.hz>30?"#d97706":"#16a34a"}/>
                <Metric label="战略储备" value={`${c.spr}天`} color={c.spr>=120?"#16a34a":c.spr>=80?"#d97706":"#dc2626"}/>
                <Metric label="自给率" value={`${self}%`} color={self>50?"#16a34a":self>20?"#d97706":"#dc2626"}/>
              </div>
              <Bar data={c.src.map((s,j)=>({...s,c:["#ef4444","#3b82f6","#22c55e","#f59e0b","#8b5cf6","#14b8a6","#6b7280"][j%7]}))} h={16}/>
              {exp&&<div style={{animation:"fu .2s",marginTop:6,fontSize:10,color:"#475569",lineHeight:1.6}}>
                <div><span style={{color:"#f59e0b",fontWeight:600}}>🚢 海运</span> {c.sea.split("|").join(" | ")}</div>
                {c.pipe&&c.pipe!=="无"&&<div style={{marginTop:2}}><span style={{color:"#0ea5e9",fontWeight:600}}>🔧 管道</span> {c.pipe}</div>}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginTop:4}}>
                  <div><span style={{color:"#16a34a",fontWeight:600}}>优势</span>{c.str.split("|").map((s,j)=><div key={j} style={{fontSize:9,color:"#64748b"}}>+ {s.trim()}</div>)}</div>
                  <div><span style={{color:"#dc2626",fontWeight:600}}>劣势</span>{c.wk.split("|").map((s,j)=><div key={j} style={{fontSize:9,color:"#64748b"}}>- {s.trim()}</div>)}</div>
                </div>
                <div style={{marginTop:3,fontSize:9,color:"#94a3b8"}}>定价基准: {c.pricing}</div>
              </div>}
            </div>;})}
        </div>}

        {/* ═══ HORMUZ ═══ */}
        {tab==="hormuz"&&<div style={{animation:"fu .4s"}}>
          <div style={{background:"#fff",borderRadius:10,padding:12,marginBottom:8,border:"1px solid #e2e8f0"}}>
            <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:5}}>出口来源国 (Q1 2025)</div>
            <Bar data={HZ_O} h={26}/>
          </div>
          <div style={{background:"#fff",borderRadius:10,padding:12,marginBottom:8,border:"1px solid #e2e8f0"}}>
            <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:5}}>目的地 (Q1 2025)</div>
            <Bar data={HZ_D} h={26}/>
          </div>
          <div style={{background:"#fff",borderRadius:10,padding:12,border:"1px solid #fca5a5"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#dc2626",marginBottom:6}}>绕行基础设施 — 覆盖率不足25%</div>
            {[{n:"沙特东西管道→Yanbu",cap:"5-7",spare:"3-5",c:"#22c55e"},{n:"UAE ADCOP→Fujairah",cap:"1.8",spare:"0(满载)",c:"#3b82f6"},{n:"伊朗Jask终端",cap:"0.35",spare:"—(战时不可用)",c:"#dc2626"}].map((p,i)=>
              <div key={i} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 0",borderBottom:i<2?"1px solid #f1f5f9":"none"}}>
                <span style={{width:5,height:5,borderRadius:"50%",background:p.c}}/>
                <span style={{flex:1,fontSize:11,color:"#334155"}}>{p.n}</span>
                <span style={{fontSize:10,color:"#94a3b8",fontFamily:"monospace"}}>容量{p.cap} | 闲置{p.spare} 百万桶/日</span>
              </div>)}
            <div style={{marginTop:6,padding:8,background:"#fef2f2",borderRadius:6,fontSize:11,color:"#dc2626",fontWeight:600}}>海峡2000万桶/日 → 最大绕行~500万 → 缺口至少1500万桶/日</div>
          </div>
        </div>}

        {/* ═══ MEMO ═══ */}
        {tab==="memo"&&<div style={{animation:"fu .4s"}}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:10}}>跟踪市场事件、记录分析假设、标注需要验证的判断</div>
          <div style={{background:"#fff",borderRadius:10,padding:12,marginBottom:12,border:"1px solid #e2e8f0"}}>
            <textarea value={memoInput} onChange={e=>setMemoInput(e.target.value)} placeholder="记录事件、假设或待验证判断..." rows={2} style={{width:"100%",background:"transparent",border:"none",color:"#1e293b",fontSize:12,resize:"none",outline:"none",lineHeight:1.6}}/>
            <div style={{display:"flex",alignItems:"center",gap:4,marginTop:6,flexWrap:"wrap"}}>
              {["事件","假设","待验证","风险","机会"].map(t=><button key={t} onClick={()=>setMemoTag(t)} style={{padding:"2px 7px",borderRadius:4,fontSize:9,fontWeight:600,border:`1px solid ${memoTag===t?"#2563eb33":"#e2e8f0"}`,background:memoTag===t?"#dbeafe":"transparent",color:memoTag===t?"#2563eb":"#94a3b8",cursor:"pointer",fontFamily:"inherit"}}>{t}</button>)}
              <button onClick={addMemo} style={{marginLeft:"auto",padding:"4px 12px",borderRadius:6,border:"none",background:"#2563eb",color:"#fff",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>添加</button>
            </div>
          </div>

          {memos.length===0&&<div style={{textAlign:"center",padding:20,color:"#cbd5e1",fontSize:12}}>还没有备忘记录<br/><span style={{fontSize:10,color:"#e2e8f0"}}>试试记录："如果海峡一个月内重开，Brent-WTI价差回归到+$5"</span></div>}
          {memos.map(m=><div key={m.id} style={{display:"flex",alignItems:"flex-start",gap:6,padding:"8px 10px",background:"#fff",borderRadius:6,marginBottom:3,border:"1px solid #e2e8f0",opacity:m.done?.5:1}}>
            <button onClick={e=>{e.stopPropagation();save(memos.map(x=>x.id===m.id?{...x,done:!x.done}:x));}} style={{width:15,height:15,borderRadius:3,border:`1px solid ${m.done?"#22c55e":"#cbd5e1"}`,background:m.done?"#22c55e":"transparent",cursor:"pointer",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff"}}>{m.done&&"✓"}</button>
            <div style={{flex:1}}>
              <div style={{fontSize:11,color:m.done?"#94a3b8":"#1e293b",textDecoration:m.done?"line-through":"none",lineHeight:1.5}}>{m.text}</div>
              <div style={{display:"flex",gap:4,marginTop:2}}>
                <span style={{fontSize:8,padding:"0 4px",borderRadius:2,background:{"事件":"#dbeafe","假设":"#fef9c3","待验证":"#f3e8ff","风险":"#fee2e2","机会":"#dcfce7"}[m.tag],color:{"事件":"#2563eb","假设":"#ca8a04","待验证":"#9333ea","风险":"#dc2626","机会":"#16a34a"}[m.tag]}}>{m.tag}</span>
                <span style={{fontSize:8,color:"#cbd5e1"}}>{m.time}</span>
              </div>
            </div>
            <button onClick={e=>{e.stopPropagation();save(memos.filter(x=>x.id!==m.id));}} style={{border:"none",background:"transparent",color:"#e2e8f0",cursor:"pointer",fontSize:11}}>×</button>
          </div>)}
        </div>}
      </main>

      <footer style={{textAlign:"center",padding:"10px",background:"#f0f4f8",borderTop:"1px solid #e2e8f0"}}>
        <div style={{fontSize:8,color:"#94a3b8",letterSpacing:1}}>黑森船长 · Captain Hessen · IEA / EIA / Kpler / OPEC / Columbia CGEP · 2026.04</div>
      </footer>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
