            <span class="ticker">${p.ticker}</span>
          </div>
          <div class="cross-tags">
            ${p.layers.map(lid => {
              const layer = LAYERS.find(l => l.id === lid);
              return `<span class="cross-tag" style="background:${layer.color}15;color:${layer.color}">${layer.icon} ${layer.label}</span>`;
            }).join("")}
          </div>
          <div class="cross-count" style="color:${isGold ? '#E8B931' : '#4ECDC4'}">${p.layers.length}\u5C42</div>
        </div>`;
      }).join("")}
    </div>`;
}

function renderThesis() {
  document.getElementById("thesisSection").innerHTML = `
    <div class="thesis-section">
      <div class="thesis-title">\u2694\uFE0F \u5148\u80DC\u540E\u6218 \u00B7 Citrini\u6301\u4ED3 \u00D7 \u7ED3\u6784\u786E\u5B9A\u6027\u6392\u5E8F</div>
      <div class="thesis-grid">
        ${THESIS.map(t => `
          <div class="thesis-card">
            <div class="thesis-card-title">${t.title}</div>
            <div class="thesis-card-sub">${t.sub}</div>
            <div class="thesis-card-name">${t.name}</div>
            <div class="thesis-card-citrini">${t.citrini}</div>
            <div class="thesis-card-desc">${t.desc}</div>
          </div>`).join("")}
      </div>
      <div class="thesis-footer">
        <span class="gold">\u7BEE\u5B50 > \u5355\u70B9</span> \u2014 Citrini\u6301\u6709 AKAM + FSLY + NET + CRCL\uFF0C\u8986\u76D6\u7BA1\u9053/\u5B89\u5168/\u652F\u4ED8\u4E09\u5C42\u3002\u8D5A\u7684\u662F\u6574\u4E2AB2A\u57FA\u7840\u8BBE\u65BD\u5C42\u7684gamma\uFF0C\u800C\u975E\u5355\u4E00\u516C\u53F8\u7684vega\u3002\u8FD9\u4E0E\u9ED1\u68EE\u8239\u957F\u201C\u4E0D\u8D5Avega\uFF0C\u8D5Agamma\u201D\u7684\u6295\u8D44\u54F2\u5B66\u9AD8\u5EA6\u4E00\u81F4\u3002
      </div>
    </div>`;
}

function setLayer(id) {
  activeLayer = id;
  renderTabs();
  renderLayerPanel();
}

function render() {
  renderChain();
  renderTabs();
  renderLayerPanel();
  renderCrossLayer();
  renderThesis();
  document.getElementById("watermark").textContent =
    "\u9ED1\u68EE\u8239\u957F \u00B7 CAPTAIN HESSEN \u00B7 STRUCTURAL CERTAINTY MAP \u00B7 " + new Date().toISOString().slice(0, 10);
}

render();
</script>
