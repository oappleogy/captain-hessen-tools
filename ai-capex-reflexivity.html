function FlowArrow({ from, to, flow, selected, onClick }) {
  const fn = NODES.find(n => n.id === from);
  const tn = NODES.find(n => n.id === to);
  if (!fn || !tn) return null;
  const x1 = fn.x, y1 = fn.y + 4, x2 = tn.x, y2 = tn.y + 4;
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  const typeColor = { equity: "#7c3aed", purchase: "#16a34a", contract: "#d97706", spv: "#dc2626" };
  return (
    <g onClick={onClick} style={{ cursor: "pointer" }} opacity={selected === null ? 0.5 : selected ? 0.9 : 0.12}>
      <line x1={`${x1}%`} y1={`${y1}%`} x2={`${x2}%`} y2={`${y2}%`}
        stroke={typeColor[flow.type] || "#666"} strokeWidth={selected ? 2.5 : 1.5}
        strokeDasharray={flow.type === "spv" ? "4,3" : "none"} />
      <circle cx={`${mx}%`} cy={`${my}%`} r={selected ? 5 : 3.5} fill={typeColor[flow.type] || "#666"} />
    </g>
  );
}
