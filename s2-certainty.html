    "STAGNANT": "低增长+高通胀的泥潭，资产回报压缩",
    "TECH_DOM": "技术进步远超制度适应力，赢家通吃加剧",
    "COLLAPSE": "系统性危机区域，多维度同时恶化"
  };

  const EXTREME_EXPLANATIONS = {
    "OVX极端": "原油波动率异常，能源市场剧烈震荡",
    "OVX原油波动率": "原油波动率异常，能源市场剧烈震荡",
    "地缘风险": "地缘政治紧张度超常，市场避险情绪升温",
    "地缘政治风险": "地缘政治紧张度超常，市场避险情绪升温",
    "VIX极端": "市场恐慌指数飙升，短期大幅波动风险",
    "信用利差极端": "企业融资成本急剧上升，信用违约风险加大"
  };

  function esc(s) { return String(s || '').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  function pctColor(p) {
    if (p >= 70) return 'var(--red)';
    if (p >= 40) return 'var(--amber)';
    return 'var(--green)';
  }

  function metricColor(v, metric) {
    if (metric === 'vix') return v > 25 ? 'var(--red)' : v > 18 ? 'var(--amber)' : 'var(--green)';
    if (metric === 'credit_spread') return v > 5 ? 'var(--red)' : v > 3.5 ? 'var(--amber)' : 'var(--green)';
    if (metric === 'consumer') return v < 70 ? 'var(--red)' : v < 90 ? 'var(--amber)' : 'var(--green)';
    return 'var(--dim)';
  }

  // Fetch with timeout
  function fetchWithTimeout(url, ms) {
    var controller = new AbortController();
    var timer = setTimeout(function() { controller.abort(); }, ms);
    return fetch(url, { signal: controller.signal }).finally(function() { clearTimeout(timer); });
  }

  let data, weekly;
  try {
    const resp = await fetchWithTimeout('data/s2-radar.json?t=' + Date.now(), 5000);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    data = await resp.json();
  } catch(e) {
    loading.innerHTML = '<p style="color:var(--muted)">S₂ 雷达数据暂不可用</p>'
      + '<p style="color:var(--muted);font-size:12px;margin-top:8px">数据文件尚未生成或加载失败，请稍后刷新</p>';
    return;
  }
  try {
    const wResp = await fetchWithTimeout('data/weekly-latest.json?t=' + Date.now(), 5000);
    if (wResp.ok) weekly = await wResp.json();
  } catch(e) { /* weekly data optional */ }

  const FRESH_MAP = { fresh: '实时', stale: '滞后', delayed: '延迟', unknown: '未知' };
  function barColor(val) { return val >= 60 ? 'var(--green)' : val < 40 ? '#ef4444' : 'var(--amber)'; }
  function labelCls(label) { return label === '景气' ? 'label-good' : label === '承压' ? 'label-bad' : 'label-neutral'; }

  // Build page
  const ss = data.system_state || {};
  const dims = data.dimensions || {};
  const att = data.attractor || {};
  const km = data.key_metrics || {};
  const opps = data.opportunities || [];
  const contra = data.contradiction;
  const extremes = data.extremes || {};
  const ts = data.timestamp || '';

  // Format timestamp
  const tsDisplay = ts ? ts.replace('T', ' ').slice(0, 16) : '—';

  // Early warning
  const ew = att.early_warning || '无';
  const hasWarning = ew !== '无' && ew !== '';

  let html = '';

  // ── 1. Status Banner ──
  html += '<div class="status-banner fade-up" style="background:' + esc(ss.color || '#334155') + '">'
    + '<div class="status-top">'
    + '<span class="status-state" style="color:#fff">' + esc(ss.label || '未知') + '</span>'
    + '<span class="status-attractor"><span class="emoji">' + esc(att.captured_emoji || '⚪') + '</span>' + esc(att.captured_name || '—') + '</span>'
    + '</div>'
    + '<div class="status-meta">';

  if (att.moving_toward) {
    html += '<span class="status-meta-item"><span class="label">运动方向</span>→ ' + esc(att.moving_toward) + '</span>';
  }
  if (att.secondary) {
    html += '<span class="status-meta-item"><span class="label">次要吸引子</span>' + esc(att.secondary) + '</span>';
  }
  html += '<span class="status-meta-item"><span class="label">数据时间</span>' + esc(tsDisplay) + '</span>';

  if (hasWarning) {
    html += '<span class="warning-badge">⚠ ' + esc(ew) + '</span>';
  }
  html += '</div>';

  // State explanation
  var stateExplain = STATE_EXPLANATIONS[ss.level] || '';
  if (stateExplain) {
    html += '<div class="status-explain">' + esc(stateExplain) + '</div>';
  }

  // Attractor explanation
  var attExplain = ATTRACTOR_EXPLANATIONS[att.captured] || '';
  if (attExplain) {
    html += '<div class="attractor-explain" style="position:relative;z-index:1;margin-top:8px;padding:0 14px;color:rgba(255,255,255,0.6);font-size:12px;">' + esc(att.captured_name || '') + '：' + esc(attExplain) + '</div>';
  }

  html += '</div>';

  // ── 2. Dimension Cards ──
  html += '<div class="sec fade-up fade-up-1"><div class="sec-head">六维雷达</div>'
    + '<div class="dims-grid">';

  for (const key of ['R', 'I', 'F', 'C', 'N', 'T']) {
    const d = dims[key] || {};
    const level = d.level || '中性';
    const ls = LEVEL_STYLE[level] || LEVEL_STYLE['中性'];
    const arrow = d.state || '►';
    const note = d.note || '';
    const label = d.name_cn || DIM_LABELS[key] || key;

    // Use note if present, otherwise use DIM_EXPLANATIONS
    var dimExplain = note || (DIM_EXPLANATIONS[key] && DIM_EXPLANATIONS[key][level]) || '';

    html += '<div class="dim-card">'
      + '<div class="dim-header"><span class="dim-name">' + esc(key) + ' · ' + esc(label) + '</span>'
      + '<span class="dim-arrow">' + esc(arrow) + '</span></div>'
      + '<div class="dim-level lv-' + ls.cls + '">' + esc(level) + '</div>'
      + '<div class="dim-note">' + esc(dimExplain) + '</div>'
      + '<div class="dim-bar"><div class="dim-bar-fill bar-' + ls.cls + '" style="width:' + ls.pct + '%"></div></div>'
      + '</div>';
  }
  html += '</div></div>';

  // ── 3. Key Metrics ──
  if (km.vix || km.credit_spread || km.consumer) {
    html += '<div class="sec fade-up fade-up-2"><div class="sec-head">关键市场指标</div>'
      + '<div class="metrics-grid">';

    if (km.vix && km.vix.value != null) {
      const v = km.vix;
      const pct = v.percentile || 0;
      html += '<div class="metric-card">'
        + '<div class="metric-label">VIX 恐慌指数</div>'
        + '<div class="metric-value" style="color:' + metricColor(v.value, 'vix') + '">' + v.value + '</div>'
        + '<div class="metric-pct-wrap">'
        + '<div class="metric-pct-bar"><div class="metric-pct-fill" style="width:' + pct + '%;background:' + pctColor(pct) + '"></div></div>'
        + '<span class="metric-pct-text">' + pct + '%</span>'
        + '</div>'
        + '<div class="metric-desc">' + esc(v.desc) + '</div></div>';
    }

    if (km.credit_spread && km.credit_spread.value != null) {
      const v = km.credit_spread;
      const pct = v.percentile || 0;
      html += '<div class="metric-card">'
        + '<div class="metric-label">高收益债利差</div>'
        + '<div class="metric-value" style="color:' + metricColor(v.value, 'credit_spread') + '">' + v.value + '%</div>'
        + '<div class="metric-pct-wrap">'
        + '<div class="metric-pct-bar"><div class="metric-pct-fill" style="width:' + pct + '%;background:' + pctColor(pct) + '"></div></div>'
        + '<span class="metric-pct-text">' + pct + '%</span>'
        + '</div>'
        + '<div class="metric-desc">' + esc(v.desc) + '</div></div>';
    }

    if (km.consumer && km.consumer.value != null) {
      const v = km.consumer;
      const pct = v.percentile || 0;
      html += '<div class="metric-card">'
        + '<div class="metric-label">消费者信心</div>'
        + '<div class="metric-value" style="color:' + metricColor(v.value, 'consumer') + '">' + v.value + '</div>'
        + '<div class="metric-pct-wrap">'
        + '<div class="metric-pct-bar"><div class="metric-pct-fill" style="width:' + pct + '%;background:' + pctColor(pct) + '"></div></div>'
        + '<span class="metric-pct-text">' + pct + '%</span>'
        + '</div>'
        + '<div class="metric-desc">' + esc(v.desc) + '</div></div>';
    }

    html += '</div>';

    // Extreme indicators
    if (extremes.count > 0) {
      html += '<div style="margin-top:12px">'
        + '<span class="extreme-badge">&#9888; ' + extremes.count + ' 个极端指标</span>';
      if (extremes.categories && extremes.categories.length) {
        html += '<div class="extreme-cats">' + extremes.categories.map(c => esc(c)).join(' · ') + '</div>';
        // Extreme explanations
        extremes.categories.forEach(function(cat) {
          var explain = '';
          for (var ek in EXTREME_EXPLANATIONS) {
            if (cat.indexOf(ek) !== -1) { explain = EXTREME_EXPLANATIONS[ek]; break; }
          }
          if (explain) {
            html += '<div class="extreme-explain">' + esc(cat) + '：' + esc(explain) + '</div>';
          }
        });
      }
      html += '</div>';
    }

    html += '</div>';
  }

  // ── 4. Structural Opportunities ──
  if (opps.length) {
    html += '<div class="sec fade-up fade-up-3"><div class="sec-head">结构性机会</div>'
      + '<div class="opp-list">';

    for (const o of opps) {
      const isActive = o.active;
      const icon = isActive ? '&#9679;' : '&#9675;';
      html += '<div class="opp-item ' + (isActive ? 'active' : 'inactive') + '">'
        + '<span class="opp-icon" style="color:' + (isActive ? 'var(--green)' : 'var(--muted)') + '">' + icon + '</span>'
        + '<div class="opp-body">'
        + '<div class="opp-name">' + esc(o.name) + '</div>'
        + '<div class="opp-desc">' + esc(o.desc) + '</div>'
        + '<div class="opp-tags">'
        + '<span class="opp-tag asym">不对称性: ' + esc(o.asymmetry) + '</span>';
      if (isActive && o.reason) {
        html += '<span class="opp-tag reason">' + esc(o.reason) + '</span>';
      }
      html += '</div></div></div>';
    }
    html += '</div></div>';
  }

  // ── 5. Core Contradiction ──
  if (contra && contra.title) {
    html += '<div class="sec fade-up fade-up-4"><div class="sec-head">核心矛盾</div>'
      + '<div class="contra-card">'
      + '<div class="contra-title">' + esc(contra.title) + '</div>'
      + '<div class="contra-thesis">' + esc(contra.thesis) + '</div>';
    if (contra.metaphor) {
      html += '<div class="contra-metaphor">"' + esc(contra.metaphor) + '"</div>';
    }
    html += '</div></div>';
  }

  // ── 6. Rule Engine Data ──
  if (weekly) {
    const d = weekly;
    html += '<div class="divider-rule fade-up fade-up-5">── 以下为规则引擎数据 ──</div>';

    // 6a. Regime banner
    if (d.regime) {
      html += '<div class="regime-banner fade-up fade-up-5">'
        + '<div class="regime-emoji">' + esc(d.regime.emoji) + '</div>'
        + '<div class="regime-name" style="color:' + esc(d.regime.color) + '">' + esc(d.regime.name) + '</div>'
        + '<div class="regime-desc">' + esc(d.regime.desc) + '</div>';
      if (d.prev_regime) {
        html += '<div class="regime-switch">⚡ 体制切换：' + esc(d.prev_regime.emoji) + ' ' + esc(d.prev_regime.name) + ' → ' + esc(d.regime.emoji) + ' ' + esc(d.regime.name) + '</div>';
      }
      html += '<div class="regime-meta">' + esc(d.week_label || '') + ' · 数据 ' + esc(d.data_time || '') + '</div></div>';
    }

    // 6b. Variables table
    if (d.variables && d.variables.length) {
      html += '<div class="sec fade-up fade-up-5"><div class="sec-head">核心变量</div>'
        + '<table class="var-table"><thead><tr><th>变量</th><th>当前值</th>';
      if (d.has_comparison) html += '<th>上周</th><th>变动</th>';
      html += '<th>日期</th><th>状态</th></tr></thead><tbody>';
      for (var i = 0; i < d.variables.length; i++) {
        var v = d.variables[i];
        var val = v.value != null ? v.value : '—';
        var freshLabel = FRESH_MAP[v.freshness] || v.freshness || '未知';
        html += '<tr><td>' + esc(v.name) + '</td><td class="val">' + val + esc(v.unit || '') + '</td>';
        if (d.has_comparison) {
          var prev = v.prev_value != null ? v.prev_value.toFixed(2) : '—';
          var dH = '<td class="delta-flat">—</td>';
          if (v.delta != null && Math.abs(v.delta) > 0.001) {
            var s = v.delta > 0 ? '+' : '', c = v.delta > 0 ? 'delta-up' : 'delta-down', a = v.delta > 0 ? '↑' : '↓';
            dH = '<td class="' + c + '">' + a + ' ' + s + v.delta.toFixed(2) + '</td>';
          }
          html += '<td class="val" style="color:var(--muted)">' + prev + esc(v.unit || '') + '</td>' + dH;
        }
        html += '<td style="font-size:11px;color:var(--muted)">' + esc(v.date || '') + '</td>'
          + '<td><span class="fresh-badge ' + (v.freshness || 'unknown') + '">' + esc(freshLabel) + '</span></td></tr>';
      }
      html += '</tbody></table></div>';
    }

    // 6c. Macro prosperity
    if (d.macro && d.macro.length) {
      html += '<div class="sec fade-up fade-up-6"><div class="sec-head">宏观景气度</div><div class="macro-list">';
      for (var mi = 0; mi < d.macro.length; mi++) {
        var m = d.macro[mi];
        var lc = labelCls(m.label), bc = barColor(m.value);
        var deltaH = '';
        if (m.delta != null && m.delta !== 0) {
          var ds = m.delta > 0 ? '+' : '', dc = m.delta > 0 ? 'label-good' : 'label-bad';
          deltaH = '<span class="macro-delta ' + dc + '">(' + ds + m.delta + ')</span>';
        }
        html += '<div class="macro-item"><div class="macro-header"><span class="macro-name">' + esc(m.name) + '</span>'
          + '<span class="macro-val">' + m.value + ' <span class="' + lc + '">' + esc(m.label) + '</span>' + deltaH + '</span></div>'
          + '<div class="bar-bg"><div class="bar-fill" style="width:' + m.value + '%;background:' + bc + '"></div></div></div>';
      }
      html += '</div></div>';
    }

    // 6d. Industry prosperity
    if (d.industries && d.industries.length) {
      html += '<div class="sec fade-up fade-up-6"><div class="sec-head">产业层景气度</div><div class="ind-grid">';
      for (var ii = 0; ii < d.industries.length; ii++) {
        var ind = d.industries[ii];
        var ilc = labelCls(ind.label), ibc = barColor(ind.value);
        html += '<div class="ind-item"><div class="ind-top"><span class="ind-name">' + esc(ind.name) + '</span>'
          + '<span class="ind-val-wrap">' + ind.value + '<span class="ind-label ' + ilc + '">' + esc(ind.label) + '</span></span></div>'
          + '<div class="ind-bar-bg"><div class="ind-bar-fill" style="width:' + ind.value + '%;background:' + ibc + '"></div></div></div>';
      }
      html += '</div></div>';
    }

    // 6e. Stress index
    if (d.stress_index) {
      var si = d.stress_index;
      var gaugeColor = si.level === 'red' ? '#ef4444' : si.level === 'yellow' ? 'var(--amber)' : si.level === 'orange' ? '#f97316' : 'var(--green)';
      html += '<div class="sec fade-up fade-up-7"><div class="sec-head">组合压力指数</div>'
        + '<div class="stress-banner"><div class="stress-gauge" style="border-color:' + gaugeColor + ';color:' + gaugeColor + '">'
        + '<div class="sg-num">' + si.score + '</div><div class="sg-label">' + esc(si.label) + '</div></div>'
        + '<div class="stress-info"><div class="si-label" style="color:' + gaugeColor + '">' + esc(si.label) + '</div>'
        + '<div class="si-desc">' + esc(si.desc) + '</div></div></div>'
        + '<div class="stress-components">';
      var maxContr = Math.max.apply(null, si.components.map(function(c){return c.contribution;})) || 1;
      for (var ci = 0; ci < si.components.length; ci++) {
        var c = si.components[ci];
        var cpct = Math.min(c.contribution / maxContr * 100, 100);
        var cbc = c.deviation_pct > 40 ? '#ef4444' : c.deviation_pct > 20 ? 'var(--amber)' : 'var(--green)';
        html += '<div class="stress-comp"><span class="sc-name">' + esc(c.name) + '</span>'
          + '<div class="sc-bar-bg"><div class="sc-bar-fill" style="width:' + cpct + '%;background:' + cbc + '"></div></div>'
          + '<span class="sc-val">偏离' + c.deviation_pct + '%</span></div>';
      }
      html += '</div>';
      if (d.significant_deviations && d.significant_deviations.length) {
        html += '<div style="margin-top:10px;font-size:11px;color:var(--muted);margin-bottom:5px">⚠️ 值得关注的信号偏离：</div>';
        for (var si2 = 0; si2 < d.significant_deviations.length; si2++) {
          var sd = d.significant_deviations[si2];
          html += '<div class="sig-dev"><span class="sd-name">' + esc(sd.name) + ': ' + sd.current + ' (基准' + sd.base + ')</span>'
            + '<span class="sd-val">' + esc(sd.direction) + ' ' + Math.abs(sd.deviation_pct) + '%</span></div>';
        }
      }
      html += '</div>';
    }

    // 6f. Regime distances
    if (d.distances && d.distances.length) {
      html += '<div class="sec fade-up fade-up-7"><div class="sec-head">体制切换距离</div><div class="dist-list">';
      for (var di = 0; di < d.distances.length; di++) {
        var dist = d.distances[di];
        var dStatus, dSty;
        if (dist.met) { dStatus = '✅ 已触发'; dSty = 'color:var(--green);font-weight:600'; }
        else if (dist.total_gap < 5) { dStatus = '⚠️ 接近'; dSty = 'color:var(--amber)'; }
        else { dStatus = '→ 远'; dSty = 'color:var(--muted)'; }
        var gaps = dist.triggers.filter(function(t){return t.gap>0;}).map(function(t){
          return esc(t.name) + '需' + t.need + t.threshold + '(当前' + t.current + ', 差' + t.gap + ')';
        }).join('，');
        html += '<div class="dist-item"><span class="dist-name">' + esc(dist.regime) + '</span>'
          + '<span class="dist-status" style="' + dSty + '">' + dStatus + '</span>'
          + '<div class="dist-detail">' + (gaps || '所有条件已满足') + '</div></div>';
      }
      html += '</div></div>';
    }
  }

  // ── 7. Footer ──
  html += '<div class="page-footer fade-up fade-up-5">'
    + '<div class="footer-brand">黑森船长 | 独立资本投资决策系统</div>'
    + '<div class="footer-disclaimer">'
    + '数据每日更新 | 所有分析仅供参考，不构成投资建议<br>'
    + 'S₂ 系统基于人类确定性理论（HCT）六维框架 | Not investment advice'
    + '</div>'
    + '<div class="footer-links">'
    + '<a href="index.html">工具箱首页</a>'
    + '<a href="certainty-map.html">确定性地图</a>'
    + '<a href="weekly.html">宏观总览</a>'
    + '<a href="gear.html">齿轮系统</a>'
    + '</div></div>';

  loading.style.display = 'none';
  app.insertAdjacentHTML('beforeend', html);
})();

// ── Service Worker 注册 ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// ── 离线提示 ──
(function() {
  var banner = document.getElementById('offline-banner');
  if (!banner) return;

  function updateOnlineStatus() {
    if (!navigator.onLine) {
      banner.classList.add('show');
    } else {
      banner.classList.remove('show');
    }
  }

  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);

  // Listen for SW offline messages
  if (navigator.serviceWorker) {
    navigator.serviceWorker.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'OFFLINE') {
        banner.classList.add('show');
      }
    });
  }

  updateOnlineStatus();
})();
