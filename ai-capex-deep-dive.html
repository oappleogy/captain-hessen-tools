function computeMetrics(data) {
  const capexIntensity = data.capex.map((c, i) => +(c / data.revenue[i] * 100).toFixed(1));
  const scissorsGap = data.revGrowth.map((r, i) => +(data.capexGrowth[i] - r).toFixed(1));
  const rev2025 = data.revenue.slice(4).reduce((a, b) => a + b, 0);
  const capex2025 = data.capex.slice(4).reduce((a, b) => a + b, 0);
  const capexIntensity2025 = +(capex2025 / rev2025 * 100).toFixed(1);
  const rev2026E = rev2025 * 1.15;
  const capexIntensity2026E = +(data.guide2026Capex / rev2026E * 100).toFixed(1);
  return { capexIntensity, scissorsGap, rev2025, capex2025, capexIntensity2025, capexIntensity2026E };
}

const COMPUTED = {};
Object.entries(RAW).forEach(([k, v]) => { COMPUTED[k] = computeMetrics(v); });

const bg = "#EFF6FF";
const surface = "#FFFFFF";
const border = "rgba(59,130,246,0.12)";
const text = "#0F172A";
const textM = "#475569";
const textD = "#94A3B8";
const accent = "#D97706";
const red = "#DC2626";
const green = "#16A34A";
const mono = "'JetBrains Mono', monospace";
const sans = "'DM Sans', sans-serif";

function MiniBar({ value, max, color, warn }) {
  const w = Math.min(100, (Math.abs(value) / max) * 100);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
      <div style={{ width: "60px", height: "8px", background: "rgba(0,0,0,0.04)", borderRadius: "4px", overflow: "hidden" }}>
        <div style={{ width: `${w}%`, height: "100%", background: warn ? red : color, borderRadius: "4px", opacity: 0.7 }} />
      </div>
      <span style={{ fontSize: "11px", fontFamily: mono, color: warn ? red : text, fontWeight: 600, minWidth: "40px" }}>
        {value}%
      </span>
    </div>
  );
}

  const m = COMPUTED[ticker];

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
          <div style={{ width: "10px", height: "10px", borderRadius: "3px", background: d.color }} />
          <span style={{ fontSize: "14px", fontWeight: 800, fontFamily: sans, color: text }}>{d.name}</span>
        </div>
        <span style={{ fontSize: "9px", fontFamily: mono, color: textD }}>来源: {d.src}</span>
      </div>
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "11px", fontFamily: mono }}>
          <thead>
            <tr>
              <th style={{ textAlign: "left", padding: "4px 6px", color: textD, fontWeight: 500, fontSize: "9px", borderBottom: `1px solid ${border}` }}></th>
              {Q_LABELS.map(q => (
                <th key={q} style={{ textAlign: "right", padding: "4px 6px", color: q.startsWith("25") ? text : textD, fontWeight: q.startsWith("25") ? 700 : 500, fontSize: "9px", borderBottom: `1px solid ${border}` }}>{q}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            <tr>
              <td style={{ padding: "5px 6px", color: textM, fontSize: "10px" }}>收入(亿$)</td>
              {d.revenue.map((v, i) => <td key={i} style={{ textAlign: "right", padding: "5px 6px", color: text }}>{v}</td>)}
            </tr>
            <tr>
              <td style={{ padding: "5px 6px", color: textM, fontSize: "10px" }}>收入同比</td>
              {d.revGrowth.map((v, i) => <td key={i} style={{ textAlign: "right", padding: "5px 6px", color: v > 20 ? green : text }}>{v}%</td>)}
            </tr>
            <tr style={{ background: "rgba(220,38,38,0.03)" }}>
              <td style={{ padding: "5px 6px", color: textM, fontSize: "10px" }}>资本开支(亿$)</td>
              {d.capex.map((v, i) => <td key={i} style={{ textAlign: "right", padding: "5px 6px", color: text, fontWeight: 700 }}>{v}</td>)}
            </tr>
            <tr style={{ background: "rgba(220,38,38,0.03)" }}>
              <td style={{ padding: "5px 6px", color: textM, fontSize: "10px" }}>开支同比</td>
              {d.capexGrowth.map((v, i) => <td key={i} style={{ textAlign: "right", padding: "5px 6px", color: v > 80 ? red : v > 50 ? accent : text }}>{v}%</td>)}
            </tr>
            <tr>
              <td style={{ padding: "5px 6px", color: accent, fontSize: "10px", fontWeight: 700 }}>开支强度</td>
              {m.capexIntensity.map((v, i) => (
                <td key={i} style={{ textAlign: "right", padding: "5px 6px" }}>
                  <MiniBar value={v} max={45} color={d.color} warn={v > 30} />
                </td>
              ))}
            </tr>
            <tr>
              <td style={{ padding: "5px 6px", color: red, fontSize: "10px", fontWeight: 700 }}>剪刀差</td>
              {m.scissorsGap.map((v, i) => (
                <td key={i} style={{ textAlign: "right", padding: "5px 6px", color: v > 50 ? red : v > 20 ? accent : green, fontWeight: 600 }}>
                  {v > 0 ? "+" : ""}{v}
                </td>
              ))}
            </tr>
          </tbody>
        </table>
      </div>
      <div style={{ display: "flex", gap: "12px", marginTop: "12px", flexWrap: "wrap" }}>
        <div style={{ background: "rgba(0,0,0,0.02)", borderRadius: "6px", padding: "8px 10px", flex: 1, minWidth: "120px" }}>
          <div style={{ fontSize: "9px", fontFamily: mono, color: textD }}>2025年开支强度</div>
          <div style={{ fontSize: "16px", fontWeight: 800, color: m.capexIntensity2025 > 25 ? red : text }}>{m.capexIntensity2025}%</div>
        </div>
        <div style={{ background: "rgba(0,0,0,0.02)", borderRadius: "6px", padding: "8px 10px", flex: 1, minWidth: "120px" }}>
          <div style={{ fontSize: "9px", fontFamily: mono, color: textD }}>2026E开支强度</div>
          <div style={{ fontSize: "16px", fontWeight: 800, color: m.capexIntensity2026E > 30 ? red : accent }}>{m.capexIntensity2026E}%</div>
        </div>
        <div style={{ background: "rgba(0,0,0,0.02)", borderRadius: "6px", padding: "8px 10px", flex: 1, minWidth: "120px" }}>
          <div style={{ fontSize: "9px", fontFamily: mono, color: textD }}>2026E指引</div>
          <div style={{ fontSize: "16px", fontWeight: 800, color: text }}>${d.guide2026Capex}亿</div>

function ScissorsChart() {
  const tickers = ["MSFT", "GOOGL", "AMZN", "META"];
  const barW = 7;
  const chartW = 680;
  const chartH = 200;
  const maxVal = 120;
  const padL = 40;
  const padB = 24;

  return (
    <div style={{ background: surface, borderRadius: "10px", padding: "16px", border: `1px solid ${border}`, boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
      <div style={{ fontSize: "13px", fontWeight: 700, color: text, fontFamily: sans, marginBottom: "4px" }}>
        收入增速 vs 资本开支增速：剪刀差全景
      </div>
      <div style={{ fontSize: "10px", color: textM, fontFamily: sans, marginBottom: "12px" }}>
        红色柱=资本开支同比增速，蓝色柱=收入同比增速。差距越大，自由现金流压力越大。
      </div>
      <svg viewBox={`0 0 ${chartW} ${chartH + padB}`} width="100%" style={{ display: "block" }}>
        {[0, 30, 60, 90, 120].map(v => {
          const y = chartH - (v / maxVal) * chartH;
          return (
            <g key={v}>
              <line x1={padL} y1={y} x2={chartW} y2={y} stroke="rgba(0,0,0,0.05)" />
              <text x={padL - 4} y={y + 3} textAnchor="end" fontSize="8" fontFamily={mono} fill={textD}>{v}%</text>
            </g>
          );
        })}
        {Q_LABELS.map((q, qi) => {
          const groupX = padL + 10 + qi * ((chartW - padL - 10) / 8);
          return (
            <g key={q}>
              <text x={groupX + 28} y={chartH + 14} textAnchor="middle" fontSize="8" fontFamily={mono} fill={qi >= 4 ? text : textD} fontWeight={qi >= 4 ? 700 : 400}>{q}</text>
              {tickers.map((tk, ti) => {
                const d = RAW[tk];
                const revH = (d.revGrowth[qi] / maxVal) * chartH;
                const capH = (Math.min(d.capexGrowth[qi], maxVal) / maxVal) * chartH;
                const x = groupX + ti * 14;
                return (
                  <g key={tk}>
                    <rect x={x} y={chartH - capH} width={barW} height={capH} fill={red} opacity={0.35} rx={1} />
                    <rect x={x} y={chartH - revH} width={barW} height={revH} fill={d.color} opacity={0.8} rx={1} />
                  </g>
                );
              })}
            </g>
          );
        })}
      </svg>
      <div style={{ display: "flex", gap: "16px", marginTop: "8px", justifyContent: "center" }}>
        {tickers.map(tk => (
          <span key={tk} style={{ display: "flex", alignItems: "center", gap: "4px", fontSize: "10px", fontFamily: mono, color: textM }}>
            <span style={{ width: "8px", height: "8px", borderRadius: "2px", background: RAW[tk].color }} />
            {RAW[tk].name}
          </span>
        ))}
        <span style={{ display: "flex", alignItems: "center", gap: "4px", fontSize: "10px", fontFamily: mono, color: textM }}>
          <span style={{ width: "8px", height: "8px", borderRadius: "2px", background: red, opacity: 0.35 }} />
          资本开支增速(浅红)
        </span>
      </div>
    </div>
  );
}

const findings = [
  { title: "Meta的开支强度最危险", detail: "资本开支占收入比从2024Q1的17.3%飙升至2025Q2-Q3的37%以上。2026E指引$1150-1350亿，开支强度预计维持35%+。唯一的对冲：AI广告平台年化收入已达$600亿，是四家中AI收入最可量化的。", risk: "高" },
  { title: "Google的加速度最陡", detail: "开支强度从2024年的12-15%跳升至2025Q4的24.5%，一年翻倍。2026E指引$1750-1850亿(高端)将使开支强度逼近35%。好消息：Cloud AI增速33.5%仍在加速，自研TPU提供成本优势。", risk: "中高" },
  { title: "Amazon相对'克制'但绝对金额最大", detail: "开支强度维持在7-11%，四家中最低——因为零售业务提供了巨大的收入分母。但2026E指引$2000亿是绝对金额之王。AWS是唯一一个AI收入完全不透明的。", risk: "中" },
  { title: "Microsoft的节奏最稳但指引激进", detail: "开支强度在23-30%区间波动，无明显恶化趋势。但FY26指引$1400亿（+59%）将推高强度至30%+。Azure AI $250亿收入指引(高盛估)是关键验证锚点。", risk: "中" },
  { title: "四家合计2026E指引：$6000-6500亿+", detail: "以四家2025年收入~$13,100亿推算，假设2026收入增速15%→收入~$15,000亿。$6000-6500亿开支 / $15,000亿收入 = 40-43%的合计开支强度。这个水平在科技行业史上前所未有。", risk: "系统性" },
];

function App() {
  const [expanded, setExpanded] = useState("MSFT");

  return (

        <div style={{ marginBottom: "16px", marginTop: "20px" }}>

          </h1>

          </div>
        </div>

        <div style={{ marginBottom: "16px" }}><ScissorsChart /></div>

        <div style={{ display: "flex", gap: "6px", marginBottom: "12px" }}>

          {findings.map((f, i) => (
            <div key={i} style={{

            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "6px" }}>
                <span style={{ fontSize: "13px", fontWeight: 700, fontFamily: sans, color: text }}>{f.title}</span>
                <span style={{
                  fontSize: "9px", fontFamily: mono, fontWeight: 700, padding: "2px 8px", borderRadius: "4px",
                  color: f.risk === "高" || f.risk === "系统性" ? red : f.risk === "中高" ? accent : green,
                  background: f.risk === "高" || f.risk === "系统性" ? "rgba(220,38,38,0.08)" : f.risk === "中高" ? "rgba(217,119,6,0.08)" : "rgba(22,163,74,0.08)",
                }}>风险: {f.risk}</span>
              </div>
              <div style={{ fontSize: "11px", color: textM, lineHeight: 1.7, fontFamily: sans }}>{f.detail}</div>
            </div>
          ))}
        </div>

        <div style={{

          border: "1px solid rgba(217,119,6,0.2)",
        }}>
          <div style={{ fontSize: "12px", fontWeight: 700, color: accent, fontFamily: sans, marginBottom: "8px" }}>数据缺口与下一步</div>
          <div style={{ fontSize: "11px", color: textM, lineHeight: 1.8, fontFamily: sans }}>
            <strong>已获取：</strong>季度收入、资本开支、增速（8个季度x4家）。2026年资本开支指引。Meta的AI广告收入年化数和单季度OCF/FCF。<br/>
            <strong>仍缺失（按价值排序）：</strong><br/>
            1. 季度OCF/FCF时间序列（除Meta 25Q3外全部缺失）——需要直接查SEC财报。自由现金流是判断"还能撑多久"的核心指标。<br/>
            2. AI收入精确拆分——IMA确认这是行业公认难题，除Meta外无官方数据。高盛对Azure AI的$250亿估算是目前最有价值的锚。<br/>
            3. 折旧政策变化——研报未覆盖。这是一个隐性的利润表美化器，需查各家10-K/10-Q附注。<br/>

            <strong style={{ color: text }}>结论：现有数据足以做"开支强度+剪刀差"分析（已完成）。FCF序列是升级分析的最高优先级缺口。</strong>

      </div>
    </>

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
