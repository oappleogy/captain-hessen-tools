                <div style={{ color: "#475569", fontSize: 10, lineHeight: 1.7 }}>{co.keyRisk}</div>
              </div>
            </div>
          );
        })()}

        {activeView === "leverage" && (
          <div>
            <div style={{ background: "#fff", borderRadius: 10, border: "1px solid rgba(59,130,246,0.1)", padding: 14, marginBottom: 14 }}>

              {LEVERAGE_LAYERS.map((l, i) => (

                    <div style={{ width: 28, height: 28, borderRadius: 6, background: `${l.color}15`, border: `1.5px solid ${l.color}`, display: "flex", alignItems: "center", justifyContent: "center", color: l.color, fontSize: 12, fontWeight: 800, marginRight: 10, flexShrink: 0 }}>
                      {l.risk === 1 ? "L" : l.risk === 2 ? "M" : "H"}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ color: "#0f172a", fontSize: 12, fontWeight: 700 }}>{l.layer}</div>

                    <div style={{ color: l.color, fontSize: 14, fontWeight: 800, fontFamily: mono, marginLeft: 8 }}>{l.amount}</div>

                    <div style={{ color: "#475569", fontSize: 10, lineHeight: 1.6 }}>{l.desc}</div>
                  </div>
                </div>
              ))}
            </div>

            <div style={{ padding: 14, borderRadius: 10, background: "rgba(220,38,38,0.04)", border: "1px solid rgba(220,38,38,0.12)" }}>
              <div style={{ color: "#dc2626", fontSize: 12, fontWeight: 700, marginBottom: 8 }}>GPU抵押 = AI版次贷？</div>
              <div style={{ color: "#475569", fontSize: 11, lineHeight: 1.8 }}>
                <b style={{color:"#0f172a"}}>2008年MBS逻辑</b>：用房产做抵押发行证券。房价上涨→抵押品充足→更多贷款→更高房价。逆转：房价跌→抵押品不足→强制平仓→房价进一步跌。
                <br/><br/>
                <b style={{color:"#0f172a"}}>2026年GPU逻辑</b>：用GPU做抵押发行债务。GPU需求旺→抵押品「值钱」→更多借贷→更多GPU采购→需求更旺。
                <br/><br/>
                <b style={{color:"#dc2626"}}>关键区别使其更危险：</b>GPU每18个月贬值50%+（摩尔定律），而房产至少有居住价值。H100→B200→下一代的换代速度意味着抵押品<b>内在价值持续归零</b>。
                <br/><br/>
                <span style={{color:"#7c3aed"}}>xAI的$20B SPV和CoreWeave的$8.5B GPU债务</span>是目前最大的两个「AI次贷」结构。详细崩溃路径见<a href="ai-capex-reflexivity.html" style={{color:"#2563eb"}}>反身性风险地图</a>。
              </div>
            </div>
          </div>
        )}

        {activeView === "signals" && (
          <div>
            <div style={{ marginBottom: 14 }}>
              {RISK_SIGNALS.map((s, i) => (
                <div key={i} style={{ display: "flex", gap: 10, padding: 12, marginBottom: 8, borderRadius: 8, background: "#fff", border: `1px solid ${s.status === "danger" ? "rgba(220,38,38,0.15)" : "rgba(217,119,6,0.15)"}`, alignItems: "flex-start" }}>
                  <div style={{ width: 10, height: 10, borderRadius: 5, marginTop: 3, flexShrink: 0,
                    background: s.status === "danger" ? "#dc2626" : "#d97706",
                    boxShadow: `0 0 6px ${s.status === "danger" ? "rgba(220,38,38,0.4)" : "rgba(217,119,6,0.4)"}` }} />
                  <div>
                    <div style={{ color: "#0f172a", fontSize: 12, fontWeight: 700, marginBottom: 4 }}>{s.signal}</div>
                    <div style={{ color: "#64748b", fontSize: 10, lineHeight: 1.6 }}>{s.detail}</div>
                  </div>
                </div>
              ))}
            </div>

            <div style={{ padding: 14, borderRadius: 10, background: "#fff", border: "1px solid rgba(59,130,246,0.1)", marginBottom: 14 }}>
              <div style={{ color: "#0f172a", fontSize: 12, fontWeight: 800, marginBottom: 8 }}>监控清单</div>
              <div style={{ color: "#475569", fontSize: 11, lineHeight: 1.8 }}>
                <b style={{color:"#d97706"}}>月度跟踪：</b><br/>
                1. OpenAI/Anthropic月度ARR变化（收入能否追上估值）<br/>
                2. SoftBank信用评级变化及再融资进展<br/>
                3. GPU二手市场价格（抵押品价值指标）<br/>
                4. CoreWeave股价及客户集中度变化<br/><br/>
                <b style={{color:"#dc2626"}}>逆转触发条件：</b><br/>
                1. 任一模型公司融资轮估值<b>下修</b>（down round）<br/>
                2. GPU抵押贷款出现margin call<br/>
                3. SoftBank被迫折价处置AI持仓<br/>
                4. AI VC融资占比从81%开始下降<br/><br/>
                超算巨头的信用状况和融资能力详见<a href="ai-capex-stress-test.html" style={{color:"#2563eb"}}>融资压力测试</a>。<br/>
                资金循环闭环和崩溃传导链详见<a href="ai-capex-reflexivity.html" style={{color:"#2563eb"}}>反身性风险地图</a>。
              </div>
            </div>
          </div>
        )}

        <div style={{ textAlign: "center", color: "#94a3b8", fontSize: 9, padding: "16px 0" }}>
          黑森船长 · AI融资套娃结构分析 · 非投资建议
        </div>
      </div>
    </>
  );
}
